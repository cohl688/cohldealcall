    <script>
        // ==========================================
        // 香港法定假期（2025-2026）
        // ==========================================
        const HK_HOLIDAYS = [
            '2025-01-01', '2025-01-29', '2025-01-30', '2025-01-31',
            '2025-04-04', '2025-04-18', '2025-04-19', '2025-04-21',
            '2025-05-01', '2025-05-05', '2025-05-31',
            '2025-07-01', '2025-10-01', '2025-10-07', '2025-10-29',
            '2025-12-25', '2025-12-26',
            '2026-01-01', '2026-02-17', '2026-02-18', '2026-02-19',
            '2026-04-03', '2026-04-04', '2026-04-06', '2026-04-07',
            '2026-05-01', '2026-05-24', '2026-05-25',
            '2026-07-01', '2026-10-01', '2026-10-27', '2026-11-18',
            '2026-12-25', '2026-12-26'
        ];

        function isHKHoliday(dateStr) { return HK_HOLIDAYS.includes(dateStr); }
        function isWeekend(dateStr) { const d = new Date(dateStr); return d.getDay() === 0 || d.getDay() === 6; }
        function isHoliday(dateStr, manualCheckboxId) {
            const manualCheckbox = document.getElementById(manualCheckboxId);
            if (manualCheckbox && manualCheckbox.checked) return true;
            return isWeekend(dateStr) || isHKHoliday(dateStr);
        }

        // ==========================================
        // 語言切換
        // ==========================================
        const translations = {
            'zh-HK': { 'nav_home': '主頁','nav_residential': '住宅','nav_carpark': '車位','nav_tools': '使用小工具','nav_runway': '📊 報每日跑道區成交','nav_hr': '人力資源', 'nav_v1': '維港1號','nav_vd': '維港雙鑽','nav_vv': '維港灣畔', 'nav_ovcp': '維港1號車位','nav_tvcp': '維港雙鑽車位','nav_vvcp': '維港灣畔車位', 'footer_home': '主頁','footer_website': '官方網站' },
            'zh-CN': { 'nav_home': '主页','nav_residential': '住宅','nav_carpark': '车位','nav_tools': '使用小工具','nav_runway': '📊 报每日跑道区成交','nav_hr': '人力资源', 'nav_v1': '维港1号','nav_vd': '维港双钻','nav_vv': '维港湾畔', 'nav_ovcp': '维港1号车位','nav_tvcp': '维港双钻车位','nav_vvcp': '维港湾畔车位', 'footer_home': '主页','footer_website': '官方网站' },
            'en': { 'nav_home': 'Home','nav_residential': 'Residential','nav_carpark': 'Carpark','nav_tools': 'Tools','nav_runway': '📊 Daily Runway Transactions','nav_hr': 'HR', 'nav_v1': 'One Victoria','nav_vd': 'Twin Victoria','nav_vv': 'Victoria Voyage', 'nav_ovcp': 'One Victoria Carpark','nav_tvcp': 'Twin Victoria Carpark','nav_vvcp': 'Victoria Voyage Carpark', 'footer_home': 'Home','footer_website': 'Official Website' }
        };

        function switchLang(lang) {
            localStorage.setItem('cohl_lang', lang);
            document.querySelectorAll('.lang-toggle button').forEach(btn => { btn.classList.toggle('active-lang', btn.dataset.lang === lang); });
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (translations[lang] && translations[lang][key]) el.textContent = translations[lang][key];
            });
        }

        // ==========================================
        // IndexedDB - 穩定版
        // ==========================================
        const DB_NAME = "ColiAppDB";
        const STORE_ROSTER = "RosterStore";
        const DB_VERSION = 4;

        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_ROSTER)) {
                        db.createObjectStore(STORE_ROSTER, { keyPath: "id" });
                    }
                };
                req.onsuccess = (e) => { resolve(e.target.result); };
                req.onerror = (e) => { reject(e.target.error); };
            });
        }

        async function checkDBStatus() {
            const statusEl = document.getElementById('dbStatus');
            try {
                const db = await openDB();
                if (db.objectStoreNames.contains(STORE_ROSTER)) {
                    statusEl.textContent = '✅ 數據庫狀態正常 (RosterStore 已就緒)';
                    statusEl.className = 'db-status success';
                } else {
                    statusEl.textContent = '⚠️ RosterStore 不存在，請點擊「修復數據庫」';
                    statusEl.className = 'db-status warning';
                }
                db.close();
                return true;
            } catch (e) {
                statusEl.textContent = '❌ 數據庫錯誤: ' + e.message;
                statusEl.className = 'db-status error';
                return false;
            }
        }

        async function fixDatabase() {
            if (!confirm("此操作將刪除所有更表數據並重建數據庫，確定繼續嗎？")) return;
            const statusEl = document.getElementById('dbStatus');
            statusEl.textContent = '⏳ 正在修復數據庫...';
            statusEl.className = 'db-status warning';
            try {
                const db = await openDB(); db.close();
                await new Promise((resolve, reject) => { const req = indexedDB.deleteDatabase(DB_NAME); req.onsuccess = () => resolve(); req.onerror = () => reject(req.error); });
                const newDb = await openDB(); newDb.close();
                rosterData = []; staffData = []; dayColMap = {};
                document.getElementById('uploadStatus').innerText = "⚠️ 數據庫已重建，請重新上載更表";
                document.getElementById('uploadStatus').style.color = "#d9534f";
                document.getElementById('excelFile').value = '';
                document.getElementById('hrEmployeeSelect').innerHTML = '<option value="">-- 請先上載 Excel --</option>';
                document.getElementById('vvResultMessage').value = '請先上載 Excel...';
                document.getElementById('tvResultMessage').value = '請先上載 Excel...';
                document.getElementById('uploadError').style.display = 'none';
                statusEl.textContent = '✅ 數據庫已重建成功！請重新上載更表';
                statusEl.className = 'db-status success';
                alert('✅ 數據庫已成功修復！請重新上載更表 Excel。');
            } catch (e) {
                statusEl.textContent = '❌ 修復失敗: ' + e.message;
                statusEl.className = 'db-status error';
                alert('❌ 修復失敗，請嘗試清除瀏覽器數據或使用其他瀏覽器。\n錯誤: ' + e.message);
            }
        }

        async function saveDataToDB(storeName, dataId, data) {
            try {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction([storeName], "readwrite");
                    const store = tx.objectStore(storeName);
                    store.put({ id: dataId, data: data });
                    tx.oncomplete = () => { db.close(); resolve(); };
                    tx.onerror = () => { db.close(); reject(tx.error); };
                });
            } catch(e) { console.error("DB Save Error", e); throw e; }
        }

        async function loadDataFromDB(storeName, dataId) {
            try {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction([storeName], "readonly");
                    const store = tx.objectStore(storeName);
                    const req = store.get(dataId);
                    req.onsuccess = () => { db.close(); resolve(req.result ? req.result.data : null); };
                    req.onerror = () => { db.close(); reject(req.error); };
                });
            } catch(e) { console.error("DB Load Error", e); return null; }
        }

        function resetRoster() {
            if(confirm("確定要清除現有更表數據並重新上載嗎？")) {
                rosterData = []; staffData = []; dayColMap = {};
                document.getElementById('uploadStatus').innerText = "⚠️ 數據已清除，請重新選擇檔案上載";
                document.getElementById('uploadStatus').style.color = "#d9534f";
                document.getElementById('uploadError').style.display = 'none';
                document.getElementById('excelFile').value = '';
                openDB().then(db => {
                    if (db.objectStoreNames.contains(STORE_ROSTER)) {
                        const tx = db.transaction([STORE_ROSTER], "readwrite");
                        tx.objectStore(STORE_ROSTER).delete("rosterData");
                        tx.oncomplete = () => { db.close(); };
                    } else { db.close(); }
                }).catch(() => {});
                document.getElementById('hrEmployeeSelect').innerHTML = '<option value="">-- 請先上載 Excel --</option>';
                document.getElementById('vvResultMessage').value = '請先上載 Excel...';
                document.getElementById('tvResultMessage').value = '請先上載 Excel...';
                checkDBStatus();
            }
        }

        function triggerFileUpload() { document.getElementById('excelFile').click(); }

        // ==========================================
        // 核心變數與功能 - 重構 AI 解析器
        // ==========================================
        let rosterData = []; 
        let rosterYear = ""; let rosterMonth = ""; let daysInMonth = 31;
        let savedLogoBase64 = "";

        const WORK_LOCATIONS = { 'C': { time: '09:00–17:30', desc: '公司(PP3)' }, 'OV': { time: '10:30–19:00', desc: '維港1號(現樓)' }, 'K': { time: '10:30–19:00', desc: '九龍灣國際交易中心' }, 'F': { time: '10:30–19:00', desc: '飛鵝山道3號(現樓)' }, 'TV': { time: '10:30–19:00', desc: '維港．雙鑽(現樓)' }, 'VV': { time: '10:30–19:00', desc: '維港‧灣畔(現樓)' }, 'VW': { time: '10:30–19:00', desc: '維港‧灣畔(現樓)' } };

        // ==========================================
        // 核心 AI 解析引擎
        // ==========================================
        function processRosterData() {
            dayColMap = {};
            staffData = [];
            
            if (!rosterData || rosterData.length === 0) return;

            // 1. 智能尋找「日期行」(掃描頭 15 行)
            for (let i = 0; i < Math.min(15, rosterData.length); i++) {
                let row = rosterData[i];
                if (!row) continue;
                
                let tempMap = {};
                let foundDays = 0;
                
                for (let j = 0; j < row.length; j++) {
                    let val = String(row[j]).trim();
                    // 如果呢格係 1-31 嘅純數字
                    if (/^([1-9]|[12][0-9]|3[01])$/.test(val)) {
                        tempMap[parseInt(val)] = j;
                        foundDays++;
                    }
                }
                
                // 如果一行入面搵到超過 20 個數字，肯定係日期嗰行，將 Map 記錄低
                if (foundDays >= 20) {
                    dayColMap = tempMap;
                    break; 
                }
            }

            // 2. 智能尋找「員工行」
            const combinedPool = [...salesPool, ...internPool];
            for (let i = 0; i < rosterData.length; i++) {
                let row = rosterData[i];
                if (!row) continue;
                
                // 掃描頭 5 個 Columns 去搵人名，解決人名唔喺第一欄嘅問題
                for (let c = 0; c < Math.min(5, row.length); c++) {
                    let cellText = String(row[c]).toUpperCase();
                    
                    // 從名單中比對
                    let matchedName = combinedPool.find(name => cellText.includes(name.toUpperCase()));
                    
                    // 確保搵到名，而且唔係標題列 (例如唔包含'姓名'、'日期'等字眼，但如果格入面有"姓名 Moon"就要容許，所以用 matchedName 雙重確認)
                    if (matchedName && !cellText.includes('期:') && !cellText.includes('月份')) {
                        staffData.push({
                            id: matchedName, 
                            rawName: String(row[c]).trim().replace(/\n/g, ' '), // 留低原名畀 HR 出勤表用
                            rowIdx: i
                        });
                        break; // 搵到就跳去下一行
                    }
                }
            }
        }

        function parseShiftToHR(shiftValue) { let val = (shiftValue || "").toString().trim().toUpperCase(); if (!val) return { time: '--', desc: '--', hours: '--' }; if (EXACT_LEAVE_TYPES[val]) return { time: EXACT_LEAVE_TYPES[val], desc: EXACT_LEAVE_TYPES[val] + '一天', hours: '--' }; for (const [symbol, leaveName] of Object.entries(SYMBOL_LEAVE_TYPES)) { if (val.includes(symbol)) return { time: leaveName, desc: leaveName + '一天', hours: '--' }; } let locations = []; let timeRange = ''; let foundWork = false; val.split('/').forEach(p => { const trimmed = p.trim(); if (WORK_LOCATIONS[trimmed]) { foundWork = true; locations.push(WORK_LOCATIONS[trimmed].desc); if (timeRange === '') timeRange = WORK_LOCATIONS[trimmed].time; } }); if (foundWork) return { time: timeRange, desc: locations.join(' / '), hours: 8.5 }; return { time: '--', desc: val, hours: '--' }; }
        
        // ===== 利用智能引擎生成當值名單 =====
        function generateMessage(type) {
            const isVV = type === 'vv';
            const dateInput = document.getElementById(`${type}DutyDate`).value;
            if (!dateInput) return;
            const d = new Date(dateInput);
            const weekdayNum = d.getDay();
            const targetDay = d.getDate();
            const formattedDate = `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()} (${["日","一","二","三","四","五","六"][weekdayNum]})`;
            const customWkAmb = document.getElementById(`${type}WeekdayAmb`).value || (isVV ? "15" : "3");
            const customHolAmb = document.getElementById(`${type}HolidayAmb`).value || (isVV ? "16" : "4");

            const manualCheckboxId = `${type}ManualHoliday`;
            const isHolidayDay = isHoliday(dateInput, manualCheckboxId);
            let ambassadorCount = isHolidayDay ? customHolAmb : customWkAmb;

            let salesToday = [], internToday = [];
            
            // 確保資料已載入，並且成功搵到日期欄位
            if (rosterData.length > 0 && Object.keys(dayColMap).length > 0) {
                const colIdx = dayColMap[targetDay]; 
                
                if (colIdx !== undefined) {
                    staffData.forEach(staff => {
                        // 去對應嘅 row 同 column 攞出更期字眼
                        let shiftValue = String(rosterData[staff.rowIdx][colIdx] || "").toUpperCase();
                        if (!shiftValue) return;
                        
                        let isIntern = internPool.includes(staff.id);
                        let isWorking = false;
                        
                        // 用 includes 去解決癡埋一齊嘅字眼，例如 'TVVV' 包含 'TV' 也包含 'VV'
                        if (isVV && (shiftValue.includes('VV') || shiftValue.includes('VW'))) {
                            isWorking = true;
                        } else if (!isVV && shiftValue.includes('TV')) {
                            isWorking = true;
                        }
                        
                        if (isWorking) {
                            if (isIntern) {
                                if (!internToday.includes(staff.id)) internToday.push(staff.id);
                            } else {
                                if (!salesToday.includes(staff.id)) salesToday.push(staff.id);
                            }
                        }
                    });
                }
            }
            
            let showflatText = "";
            const flatsArr = isVV ? vvFlats : tvFlats;
            flatsArr.forEach(flat => { if (flat.label.trim() && flat.value.trim()) showflatText += `${flat.label}：${flat.value}\n`; });
            showflatText += `\n${document.getElementById(`${type}_remarks`).value.trim()}`;
            
            const projName = isVV ? "維港‧灣畔現樓" : "維港‧雙鑽現樓";
            const cleanerCount = isVV ? 3 : 1;
            
            let msg = `${projName}\n${formattedDate}\n\n⏰當值時間：10:30pm-7:00pm\n\n👤當值人員\n`;
            msg += `銷售 ：${salesToday.length ? salesToday.join(', ') + ' (' + salesToday.length + '人)' : '無 (0人)'}\n`;
            if (isVV) msg += `實習生：${internToday.length ? internToday.join(', ') + ' (' + internToday.length + '人)' : '無 (0人)'}\n`;
            msg += `服務大使：${ambassadorCount}人\n清潔：${cleanerCount}人\n\n「開放示範單位」：\n${showflatText}`;
            
            document.getElementById(`${type}ResultMessage`).value = msg;
        }

        function exportToWord() {
            const select = document.getElementById('hrEmployeeSelect'); 
            if (!select.value) { alert("請先上載更表並選擇員工！"); return; }
            
            const staffId = select.value; 
            const staffObj = staffData.find(s => s.id === staffId);
            if (!staffObj) return;
            
            const rowIndex = staffObj.rowIdx;
            const empName = staffObj.rawName;
            
            const position = document.getElementById('hrPosition').value.trim(); 
            const empId = document.getElementById('hrEmpId').value.trim();
            if (!rosterYear || !rosterMonth) { alert("無法從 Excel 讀取年月，請確保格式正確。"); return; }
            
            const rowData = rosterData[rowIndex]; 
            let totalHours = 0;
            let imgHtml = savedLogoBase64 ? `<img src="${savedLogoBase64}" style="width: 250px; height: auto;" />` : `<h3 style="color:#0056b3;">[未上載公司 Logo]</h3>`;
            let htmlContent = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><style>body { font-family: 'MingLiU', 'PMingLiU', 'Microsoft JhengHei', sans-serif; font-size: 12pt; } table { width: 100%; border-collapse: collapse; margin-bottom: 10px; } th, td { border: 1px solid black; padding: 6px; text-align: center; } .meta-table td { border: none; text-align: left; padding: 2px; } h2 { text-align: center; font-size: 16pt; margin-bottom: 20px; } .logo-container { text-align: left; margin-bottom: 15px; } </style></head><body><div class="logo-container">${imgHtml}</div><h2>手寫出勤記錄表 ( ${rosterYear} )年(${rosterMonth})月份</h2><table class="meta-table"><tr><td style="width: 25%;">姓名：${empName}</td><td style="width: 25%;">職位：${position}</td><td style="width: 25%;">部門/地盤：營業部</td><td style="width: 25%;">員工編號：${empId}</td></tr></table><table><tr><th style="width: 10%;">日</th><th style="width: 30%;">工作起止時間</th><th style="width: 45%;">工作內容</th><th style="width: 15%;">共計</th></tr>`;
            
            // 用 dayColMap 解決 HR 表格走位問題
            for (let day = 1; day <= daysInMonth; day++) {
                let colIdx = dayColMap[day];
                let shiftVal = colIdx !== undefined ? rowData[colIdx] : "";
                const parsed = parseShiftToHR(shiftVal);
                htmlContent += `<tr><td>${day}</td><td>${parsed.time}</td><td>${parsed.desc}</td><td>${parsed.hours === '--' ? '--' : parsed.hours + '小時'}</td></tr>`;
                if (typeof parsed.hours === 'number') totalHours += parsed.hours;
            }
            htmlContent += `</table><p style="text-align: right; margin-top: 10px; font-weight: bold;">總計時數：${totalHours} 小時</p></body></html>`;
            const monthsEng = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const monthWord = monthsEng[parseInt(rosterMonth) - 1] || rosterMonth; 
            
            const safeName = staffObj.id.replace(/ /g, '_');
            const fileDownload = document.createElement("a"); document.body.appendChild(fileDownload);
            fileDownload.href = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(htmlContent); fileDownload.download = `${safeName}出勤記錄表${monthWord} ${rosterYear}.doc`; fileDownload.click(); document.body.removeChild(fileDownload);
        }

        function copyToClipboard(elementId) { const t = document.getElementById(elementId); if(!t.value || t.value.includes("請先上載")) { alert("未能複製空內容"); return; } t.select(); t.setSelectionRange(0, 99999); navigator.clipboard.writeText(t.value).then(() => alert("✅ 已複製")).catch(() => alert("請手動複製")); }

        // ===== Dark Mode =====
        (function() {
            const toggle = document.getElementById('themeToggle');
            const icon = document.getElementById('themeIcon');
            const label = document.getElementById('themeLabel');
            const html = document.documentElement;

            const savedTheme = localStorage.getItem('cohl-theme');
            if (savedTheme === 'dark') { html.setAttribute('data-theme', 'dark'); icon.textContent = '☀️'; label.textContent = '淺色'; }

            toggle.addEventListener('click', function() {
                const isDark = html.getAttribute('data-theme') === 'dark';
                if (isDark) { html.removeAttribute('data-theme'); localStorage.setItem('cohl-theme', 'light'); icon.textContent = '🌙'; label.textContent = '深色'; } 
                else { html.setAttribute('data-theme', 'dark'); localStorage.setItem('cohl-theme', 'dark'); icon.textContent = '☀️'; label.textContent = '淺色'; }
            });
        })();

        // ===== 下拉菜單 =====
        document.querySelectorAll('.dropdown-toggle').forEach(function(toggle) { toggle.addEventListener('click', function(e) { e.preventDefault(); var parent = this.closest('.dropdown'); if (parent) { parent.classList.toggle('open'); } }); });
        document.addEventListener('click', function(e) { document.querySelectorAll('.dropdown.open').forEach(function(dropdown) { if (!dropdown.contains(e.target)) { dropdown.classList.remove('open'); } }); });
    </script>
</body>
</html>
