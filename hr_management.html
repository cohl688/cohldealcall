        .hr-body .hr-section input[type="file"], .hr-body .hr-section input[type="date"], 
        .hr-body .hr-section input[type="text"], .hr-body .hr-section input[type="number"],

        function isHKHoliday(dateStr) { return HK_HOLIDAYS.includes(dateStr); }
        function isWeekend(dateStr) { const day = new Date(dateStr).getDay(); return day === 0 || day === 6; }
        function isHoliday(dateStr, manualCheckboxId) {
            const manualCheckbox = document.getElementById(manualCheckboxId);
            if (manualCheckbox && manualCheckbox.checked) return true;

        const translations = {
            'zh-HK': { 'nav_home': '主頁','nav_residential': '住宅','nav_carpark': '車位','nav_tools': '使用小工具','nav_runway': '📊 報每日跑道區成交','nav_hr': '人力資源', 'nav_v1': '維港1號','nav_vd': '維港雙鑽','nav_vv': '維港灣畔', 'nav_ovcp': '維港1號車位','nav_tvcp': '維港雙鑽車位','nav_vvcp': '維港灣畔車位', 'footer_home': '主頁','footer_website': '官方網站' },

            'en': { 'nav_home': 'Home','nav_residential': 'Residential','nav_carpark': 'Carpark','nav_tools': 'Tools','nav_runway': '📊 Daily Runway Transactions','nav_hr': 'HR', 'nav_v1': 'One Victoria','nav_vd': 'Twin Victoria','nav_vv': 'Victoria Voyage', 'nav_ovcp': 'One Victoria Carpark','nav_tvcp': 'Twin Victoria Carpark','nav_vvcp': 'Victoria Voyage Carpark', 'footer_home': 'Home','footer_website': 'Official Website' }
        };
        function switchLang(lang) {
            localStorage.setItem('cohl_lang', lang);
            document.querySelectorAll('.lang-toggle button').forEach(btn => btn.classList.toggle('active-lang', btn.dataset.lang === lang));
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (translations[lang] && translations[lang][key]) el.textContent = translations[lang][key];
            });
        }

        const DB_NAME = "ColiAppDB"; const STORE_ROSTER = "RosterStore"; const DB_VERSION = 5;
        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_ROSTER)) db.createObjectStore(STORE_ROSTER, { keyPath: "id" });
                };
                req.onsuccess = (e) => resolve(e.target.result); req.onerror = (e) => reject(e.target.error);
            });
        }
        async function saveRosterToDB(data) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction([STORE_ROSTER], "readwrite");
                tx.objectStore(STORE_ROSTER).put({ id: "rosterData", data: data });
                tx.oncomplete = () => { db.close(); resolve(); }; tx.onerror = () => { db.close(); reject(tx.error); };
            });
        }
        async function loadRosterFromDB() {
            try {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const req = db.transaction([STORE_ROSTER], "readonly").objectStore(STORE_ROSTER).get("rosterData");
                    req.onsuccess = () => { db.close(); resolve(req.result ? req.result.data : null); };
                    req.onerror = () => { db.close(); reject(req.error); };
                });
            } catch(e) { return null; }
        }
        async function clearRosterFromDB() {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction([STORE_ROSTER], "readwrite");
                tx.objectStore(STORE_ROSTER).delete("rosterData");
                tx.oncomplete = () => { db.close(); resolve(); };
            });
        }

        // ==========================================
        // 全新升級：X 坐標對齊 PDF 解析引擎 (防空白格移位)
        // ==========================================
        async function parsePDF(pdfData) {
            const statusEl = document.getElementById('pdfStatus');
            statusEl.className = 'pdf-parse-status info';
            statusEl.textContent = '⏳ 正在解析 PDF，請稍候...';

            try {
                const pdf = await pdfjsLib.getDocument({ data: pdfData }).promise;
                const numPages = pdf.numPages;
                let allTextItems = [];

                for (let pageNum = 1; pageNum <= numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({ scale: 1 });
                    const textContent = await page.getTextContent();
                    for (let item of textContent.items) {
                        if(item.str.trim() === '') continue;
                        allTextItems.push({
                            text: item.str.trim(),
                            x: item.transform[4],
                            y: viewport.height - item.transform[5],
                        });
                    }
                }

                // 根據 Y 坐標分行
                allTextItems.sort((a, b) => a.y - b.y || a.x - b.x);
                const lines = [];
                let currentLine = [];
                let currentY = null;
                const Y_THRESHOLD = 5;

                for (let item of allTextItems) {
                    if (currentY === null || Math.abs(item.y - currentY) < Y_THRESHOLD) {
                        currentLine.push(item);
                        currentY = item.y;
                    } else {
                        if (currentLine.length > 0) lines.push(currentLine);
                        currentLine = [item];
                        currentY = item.y;
                    }
                }
                if (currentLine.length > 0) lines.push(currentLine);

                let dateXCoords = [];
                let startRow = -1;

                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i];
                    let texts = line.map(it => it.text);
                    
                    if (texts.includes('1') && texts.includes('15') && (texts.includes('30') || texts.includes('31'))) {
                        for (let d = 1; d <= 31; d++) {
                            let dItem = line.find(it => it.text === String(d));
                            if (dItem) dateXCoords.push({ day: d, x: dItem.x });
                        }
                    }
                    if (startRow === -1 && texts.some(t => t.includes('(') || t.includes('（'))) {
                        if (!texts.join('').includes('星期')) startRow = i;
                    }
                }

                if (startRow === -1 || dateXCoords.length === 0) {
                    throw new Error("無法辨識員工數據或日期標題(X坐標)");
                }

                const newRoster = [];
                newRoster.push(['售樓處員工值勤表(自動對齊版)']);
                newRoster.push(['2026年7月份']);
                const dateRow = ['值勤地點'];
                for (let d = 1; d <= 31; d++) dateRow.push(String(d));
                newRoster.push(dateRow);
                newRoster.push(['星期', ...new Array(31).fill('')]);
                newRoster.push(['姓名', ...new Array(31).fill('')]);

                const excludeKeywords = ['售樓處', '值勤地點', '星期', '姓名', '時間', 'pm', 'am', '公司', '現樓', '當值', '九龍灣早更'];

                for (let i = startRow; i < lines.length; i++) {
                    let line = lines[i];
                    line.sort((a, b) => a.x - b.x); 
                    let texts = line.map(it => it.text);
                    
                    let fullName = '';
                    let nameItemCount = 1;

                    if (texts.length > 0 && (texts[0].includes('(') || texts[0].includes('（'))) {
                        fullName = texts[0];
                    } else if (texts.length > 1 && (texts[1].includes('(') || texts[1].includes('（'))) {
                        fullName = texts[0] + ' ' + texts[1];
                        nameItemCount = 2;
                    } else {
                        continue; 
                    }

                    let isExcluded = excludeKeywords.some(kw => fullName.includes(kw));
                    if (isExcluded) continue;

                    let dayData = new Array(31).fill('');
                    
                    for (let j = nameItemCount; j < line.length; j++) {
                        let item = line[j];
                        if (item.x < dateXCoords[0].x - 12) continue; 
                        
                        let closestDay = -1;
                        let minDiff = Infinity;
                        for (let k = 0; k < dateXCoords.length; k++) {
                            let diff = Math.abs(item.x - dateXCoords[k].x);
                            if (diff < minDiff) {
                                minDiff = diff;
                                closestDay = dateXCoords[k].day;
                            }
                        }

                        if (closestDay !== -1 && minDiff <= 16) {
                            if (dayData[closestDay - 1]) dayData[closestDay - 1] += ' ' + item.text;
                            else dayData[closestDay - 1] = item.text;
                        }
                    }

                    const newRow = [fullName, '', '', ...dayData];
                    newRoster.push(newRow);
                }

                rosterData = newRoster;
                const monthMatch = rosterData[1] && rosterData[1][0] ? rosterData[1][0].match(/(\d{4})年(\d{1,2})月份/) : null;
                if (monthMatch) {
                    rosterYear = monthMatch[1]; rosterMonth = monthMatch[2];
                    daysInMonth = new Date(parseInt(rosterYear), parseInt(rosterMonth), 0).getDate();
                }

                await saveRosterToDB(rosterData);

                statusEl.className = 'pdf-parse-status success';
                statusEl.textContent = `✅ PDF 解析成功！共載入 ${newRoster.length - 5} 位員工數據。`;
                document.getElementById('uploadStatus').innerText = `✅ 已從 PDF 載入更表數據 (${rosterYear}年${rosterMonth}月份)`;
                document.getElementById('uploadStatus').style.color = "#28a745";
                
                populateEmployeeDropdown();
                generateMessage('vv'); generateMessage('tv');
                return true;

            } catch (err) {
                console.error(err);
                statusEl.className = 'pdf-parse-status error';
                statusEl.textContent = '❌ PDF 解析失敗: ' + err.message;
                return false;
            }
        }

            flatsArr.forEach(flat => { if (flat.label.trim() && flat.value.trim()) showflatText += `${flat.label}：${flat.value}\n`; });
            showflatText += `\n${document.getElementById(`${type}_remarks`).value.trim()}`;
            const projName = isVV ? "維港‧灣畔現樓" : "維港‧雙鑽現樓";
            const cleanerCount = isVV ? 3 : 1;
            let msg = `${projName}\n${formattedDate}\n\n⏰當值時間：10:30pm-7:00pm\n\n👤當值人員\n`;
            msg += `銷售 ：${salesToday.length ? salesToday.join(', ') + ' (' + salesToday.length + '人)' : '無 (0人)'}\n`;
            if (isVV) msg += `實習生：${internToday.length ? internToday.join(', ') + ' (' + internToday.length + '人)' : '無 (0人)'}\n`;
            msg += `服務大使：${ambassadorCount}人\n清潔：${cleanerCount}人\n\n「開放示範單位」：\n${showflatText}`;
            document.getElementById(`${type}ResultMessage`).value = msg;
        }
        
        // ==========================================
        // 過濾員工下拉選單 (去除括號)
        // ==========================================
        function populateEmployeeDropdown() {
            const select = document.getElementById('hrEmployeeSelect');
            select.innerHTML = '<option value="">-- 請選擇員工 --</option>';
            const excludeKeywords = ['售樓', '售機', '值勤表', '值勤地點', '星期', '姓名', '員工', '時間', 'pm', 'am', '公司', '現樓', '當值', '九龍灣早更'];
            for (let i = 0; i < rosterData.length; i++) {
                let row = rosterData[i];
                if (!row || !row[0]) continue;
                let fullName = String(row[0]).trim();
                if (!fullName) continue;
                
                if (!fullName.includes('(') && !fullName.includes('（')) continue;
                let isExcluded = excludeKeywords.some(kw => fullName.includes(kw));
                if (isExcluded) continue;
                
                let cleanName = fullName.split('(')[0].split('（')[0].trim();
                if (cleanName) {
                    select.innerHTML += `<option value="${i}">${cleanName}</option>`;
                }
            }
        }
        
        function loadEmployeeData() {
            const select = document.getElementById('hrEmployeeSelect');
            if (!select.value) return;
            const name = select.options[select.selectedIndex].text;
            const saved = localStorage.getItem('hr_data_' + name);
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('hrPosition').value = data.position || '';
                document.getElementById('hrEmpId').value = data.empId || '';
            } else {
                document.getElementById('hrPosition').value = '';
                document.getElementById('hrEmpId').value = '';
            }
        }
        
        function saveEmployeeData() {
            const select = document.getElementById('hrEmployeeSelect');
            if (!select.value) return;
            const name = select.options[select.selectedIndex].text;
            localStorage.setItem('hr_data_' + name, JSON.stringify({
                position: document.getElementById('hrPosition').value.trim(),
                empId: document.getElementById('hrEmpId').value.trim()
            }));
        }
        
        // ==========================================
        // 匯出 Word
        // ==========================================
        function exportToWord() {
            const select = document.getElementById('hrEmployeeSelect');
            if (!select.value) { alert("請先選擇員工！"); return; }
            const rowIndex = parseInt(select.value);
            const empName = select.options[select.selectedIndex].text; 
            const position = document.getElementById('hrPosition').value.trim();
            const empId = document.getElementById('hrEmpId').value.trim();
            
            const rowData = rosterData[rowIndex];
            let totalHours = 0;
            let imgHtml = savedLogoBase64 ? `<img src="${savedLogoBase64}" style="width: 250px; height: auto;" />` : `<h3 style="color:#0056b3;">[未上載公司 Logo]</h3>`;
            let htmlContent = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><style>body { font-family: 'MingLiU', 'PMingLiU', 'Microsoft JhengHei', sans-serif; font-size: 12pt; } table { width: 100%; border-collapse: collapse; margin-bottom: 10px; } th, td { border: 1px solid black; padding: 6px; text-align: center; } .meta-table td { border: none; text-align: left; padding: 2px; } h2 { text-align: center; font-size: 16pt; margin-bottom: 20px; } .logo-container { text-align: left; margin-bottom: 15px; } </style></head><body><div class="logo-container">${imgHtml}</div><h2>手寫出勤記錄表 ( ${rosterYear} )年(${rosterMonth})月份</h2><table class="meta-table"><tr><td style="width: 25%;">姓名：${empName}</td><td style="width: 25%;">職位：${position}</td><td style="width: 25%;">部門/地盤：營業部</td><td style="width: 25%;">員工編號：${empId}</td></tr></table><table><tr><th style="width: 10%;">日</th><th style="width: 30%;">工作起止時間</th><th style="width: 45%;">工作內容</th><th style="width: 15%;">共計</th></tr>`;
            
            for (let day = 1; day <= daysInMonth; day++) {
                const colIndex = day + 2; 
                let shiftVal = (colIndex < rowData.length) ? rowData[colIndex] : '';
                const parsed = parseShiftToHR(shiftVal);
                htmlContent += `<tr><td>${day}</td><td>${parsed.time}</td><td>${parsed.desc}</td><td>${parsed.hours === '--' ? '--' : parsed.hours + '小時'}</td></tr>`;
                if (typeof parsed.hours === 'number') totalHours += parsed.hours;
            }
            
            htmlContent += `</table><p style="text-align: right; margin-top: 10px; font-weight: bold;">總計時數：${totalHours} 小時</p></body></html>`;
            const monthWord = "July";
            const safeName = empName.replace(/ /g, '_');
            const fileDownload = document.createElement("a");
            document.body.appendChild(fileDownload);
            fileDownload.href = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(htmlContent);
            fileDownload.download = `${safeName}出勤記錄表${monthWord} ${rosterYear}.doc`;
            fileDownload.click();
            document.body.removeChild(fileDownload);
        }

        function parseShiftToHR(shiftValue) { 
            let val = (shiftValue || "").toString().trim().toUpperCase(); 
            if (!val) return { time: '--', desc: '--', hours: '--' }; 
            if (EXACT_LEAVE_TYPES[val]) return { time: EXACT_LEAVE_TYPES[val], desc: EXACT_LEAVE_TYPES[val] + '一天', hours: '--' }; 
            for (const [symbol, leaveName] of Object.entries(SYMBOL_LEAVE_TYPES)) { 
                if (val.includes(symbol)) return { time: leaveName, desc: leaveName + '一天', hours: '--' }; 
            } 
            let locations = []; 
            let timeRange = ''; 
            let foundWork = false; 
            val.split('/').forEach(p => { 
                const trimmed = p.trim(); 
                if (WORK_LOCATIONS[trimmed]) { 
                    foundWork = true; 
                    locations.push(WORK_LOCATIONS[trimmed].desc); 
                    if (timeRange === '') timeRange = WORK_LOCATIONS[trimmed].time; 
                } 
            }); 
            if (foundWork) return { time: timeRange, desc: locations.join(' / '), hours: 8.5 }; 
            return { time: '--', desc: val, hours: '--' }; 
        }

        async function copyToClipboard(elementId) {
            const t = document.getElementById(elementId);
            if (!t.value || t.value.includes("請選擇日期")) { alert("未能複製空內容"); return; }
            try { await navigator.clipboard.writeText(t.value); alert("✅ 已複製"); } 
            catch (err) { t.select(); t.setSelectionRange(0, 99999); document.execCommand('copy'); alert("✅ 已複製 (備用方式)"); }
        }

        (function() {
            const toggle = document.getElementById('themeToggle');
            const icon = document.getElementById('themeIcon');
            const label = document.getElementById('themeLabel');
            const html = document.documentElement;
            const savedTheme = localStorage.getItem('cohl-theme');
            if (savedTheme === 'dark') { html.setAttribute('data-theme', 'dark'); icon.textContent = '☀️'; label.textContent = '淺色'; }
            toggle.addEventListener('click', function() {
                const isDark = html.getAttribute('data-theme') === 'dark';
                if (isDark) { html.removeAttribute('data-theme'); localStorage.setItem('cohl-theme', 'light'); icon.textContent = '🌙'; label.textContent = '深色'; } 
                else { html.setAttribute('data-theme', 'dark'); localStorage.setItem('cohl-theme', 'dark'); icon.textContent = '☀️'; label.textContent = '淺色'; }
            });
        })();

        document.querySelectorAll('.dropdown-toggle').forEach(function(toggle) {
            toggle.addEventListener('click', function(e) {
                e.preventDefault();
                var parent = this.closest('.dropdown');
                if (parent) parent.classList.toggle('open');
            });
        });

        document.addEventListener('click', function(e) {
            document.querySelectorAll('.dropdown.open').forEach(function(dropdown) {
                if (!dropdown.contains(e.target)) dropdown.classList.remove('open');
            });
        });
    </script>
</body>
