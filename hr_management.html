            return HK_HOLIDAYS.includes(dateStr);

            const d = new Date(dateStr);
            const day = d.getDay();
            return day === 0 || day === 6;
        }

        function isHoliday(dateStr, manualCheckboxId) {
            const manualCheckbox = document.getElementById(manualCheckboxId);
            if (manualCheckbox && manualCheckbox.checked) {
                return true;
            }
            return isWeekend(dateStr) || isHKHoliday(dateStr);

        // ==========================================
        // PDF 解析函數
        // ==========================================
        async function parsePDF(pdfData) {
            const statusEl = document.getElementById('pdfStatus');
            statusEl.className = 'pdf-parse-status info';
            statusEl.textContent = '⏳ 正在解析 PDF，請稍候...';

            try {
                const pdf = await pdfjsLib.getDocument({ data: pdfData }).promise;
                const numPages = pdf.numPages;
                let allTextItems = [];

                // 提取所有頁面的文字和位置
                for (let pageNum = 1; pageNum <= numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({ scale: 1 });
                    const textContent = await page.getTextContent();
                    
                    // 轉換成 { text, x, y, width, height }
                    for (let item of textContent.items) {
                        allTextItems.push({
                            text: item.str.trim(),
                            x: item.transform[4],
                            y: viewport.height - item.transform[5], // PDF 座標原點在左下角，轉為左上角
                            width: item.width,
                            height: item.height
                        });
                    }
                }

                // 按 Y 座標排序（由上到下）
                allTextItems.sort((a, b) => a.y - b.y || a.x - b.x);

                // 合併同一行（Y 座標差距小於 5）
                const lines = [];
                let currentLine = [];
                let currentY = null;
                const Y_THRESHOLD = 5;

                for (let item of allTextItems) {
                    if (!item.text) continue;
                    if (currentY === null || Math.abs(item.y - currentY) < Y_THRESHOLD) {
                        currentLine.push(item);
                        currentY = item.y;
                    } else {
                        if (currentLine.length > 0) {
                            lines.push(currentLine);
                        }
                        currentLine = [item];
                        currentY = item.y;
                    }
                }
                if (currentLine.length > 0) lines.push(currentLine);

                // 將每一行轉為文字陣列（按 X 排序）
                const textLines = lines.map(line => {
                    line.sort((a, b) => a.x - b.x);
                    return line.map(item => item.text);
                });

                // 搵出員工數據嘅起始行（包含括號嘅行）
                let startRow = -1;
                for (let i = 0; i < textLines.length; i++) {
                    let row = textLines[i];
                    if (!row || row.length === 0) continue;
                    // 檢查是否包含括號
                    for (let cell of row) {
                        if (cell.includes('(') || cell.includes('（')) {
                            startRow = i;
                            break;
                        }
                    }
                    if (startRow !== -1) break;
                }

                if (startRow === -1) {
                    statusEl.className = 'pdf-parse-status error';
                    statusEl.textContent = '❌ 無法辨識員工數據，請確認 PDF 格式正確。';
                    return false;
                }

                // 開始構建 rosterData
                const newRoster = [];
                // 加入標題行（從內置複製）
                newRoster.push(['售樓處員工值勤表(第五版)']);
                newRoster.push(['2026年7月份']);
                // 建立日期行（1-31）
                const dateRow = ['值勤地點'];
                for (let d = 1; d <= 31; d++) dateRow.push(String(d));
                newRoster.push(dateRow);
                // 星期行（按實際 PDF 內容，需要推算，暫時用內置）
                const weekRow = ['星期', '三', '四', '五', '六', '日', '一', '二', '三', '四', '五', '六', '日', '一', '二', '三', '四', '五', '六', '日', '一', '二', '三', '四', '五', '六', '日', '一', '二', '三', '四', '五'];
                newRoster.push(weekRow);
                newRoster.push(['姓名', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '']);

                // 提取員工數據
                for (let i = startRow; i < textLines.length; i++) {
                    let row = textLines[i];
                    if (!row || row.length === 0) continue;
                    // 合併第一個欄位（可能姓名和括號分開）
                    let fullName = '';
                    let bracket = '';
                    let dataCells = [];
                    // 嘗試將 row[0] + row[1] 組合成姓名
                    let namePart = row[0] || '';
                    let bracketPart = row[1] || '';
                    if (bracketPart.includes('(') || bracketPart.includes('（')) {
                        fullName = namePart + ' ' + bracketPart;
                        dataCells = row.slice(2);
                    } else {
                        // 可能姓名和括號在同一格
                        fullName = row[0] || '';
                        dataCells = row.slice(1);
                    }
                    // 檢查是否為有效員工（姓名包含括號或 row[1] 包含括號）
                    if (!fullName.includes('(') && !fullName.includes('（') && !bracketPart.includes('(') && !bracketPart.includes('（')) {
                        // 跳過非員工行
                        continue;
                    }
                    // 去除多餘空格
                    fullName = fullName.trim();
                    // 只保留前 31 個數據（對應 1-31 日）
                    const dayData = dataCells.slice(0, 31).map(cell => cell || '');
                    // 插入新行
                    const newRow = [fullName, '', ...dayData];
                    newRoster.push(newRow);
                }

                // 檢查是否成功解析到員工
                if (newRoster.length <= 5) {
                    statusEl.className = 'pdf-parse-status error';
                    statusEl.textContent = '❌ 未能從 PDF 提取員工數據，請檢查 PDF 格式。';
                    return false;
                }

                // 更新 rosterData
                rosterData = newRoster;
                // 更新年月
                const monthMatch = rosterData[1] && rosterData[1][0] ? rosterData[1][0].match(/(\d{4})年(\d{1,2})月份/) : null;
                if (monthMatch) {
                    rosterYear = monthMatch[1];
                    rosterMonth = monthMatch[2];
                    daysInMonth = new Date(rosterYear, rosterMonth, 0).getDate();
                }

                statusEl.className = 'pdf-parse-status success';
                statusEl.textContent = `✅ PDF 解析成功！共載入 ${newRoster.length - 5} 位員工數據。`;
                document.getElementById('uploadStatus').innerText = `✅ 已從 PDF 載入更表數據 (${rosterYear}年${rosterMonth}月份)`;
                document.getElementById('uploadStatus').style.color = "#28a745";
                
                // 更新 HR dropdown
                populateEmployeeDropdown();
                // 重新生成訊息
                generateMessage('vv');
                generateMessage('tv');
                return true;

            } catch (err) {
                console.error('PDF 解析錯誤:', err);
                statusEl.className = 'pdf-parse-status error';
                statusEl.textContent = '❌ PDF 解析失敗: ' + err.message;
                return false;
            }
        }

            const statusEl = document.getElementById('pdfStatus');
            const errorEl = document.getElementById('uploadError');
            errorEl.style.display = 'none';

            if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) {
                errorEl.textContent = '❌ 請上載 .pdf 格式檔案';
                errorEl.style.display = 'block';
                return;
            }

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const pdfData = new Uint8Array(e.target.result);
                    const success = await parsePDF(pdfData);
                    if (success) {
                        alert('✅ PDF 更表上載成功！');
                    }
                } catch (err) {
                    statusEl.className = 'pdf-parse-status error';
                    statusEl.textContent = '❌ 讀取 PDF 失敗: ' + err.message;
                }
            };
            reader.onerror = function() {
                statusEl.className = 'pdf-parse-status error';
                statusEl.textContent = '❌ 無法讀取檔案';
            };
            reader.readAsArrayBuffer(file);
        });

        function initSortable(type) { 
            const container = document.getElementById(`${type}FlatsContainer`);
            if (!container) return;
            if (container._sortable) {
                container._sortable.destroy();
            }
            container._sortable = new Sortable(container, { 
                handle: '.hr-drag-handle', 
                animation: 150,
                forceFallback: true,
                fallbackTolerance: 3,
                touchStartThreshold: 2,
                onEnd: function (evt) { 
                    const arr = type === 'vv' ? vvFlats : tvFlats; 
                    const item = arr.splice(evt.oldIndex, 1)[0]; 
                    arr.splice(evt.newIndex, 0, item); 
                    saveSettings(type); 
                    renderFlats(type); 
                } 
            }); 
        }

        function generateMessage(type) {
            const isVV = type === 'vv';
            const dateInput = document.getElementById(`${type}DutyDate`).value;
            if (!dateInput) return;
            
            const parts = dateInput.split('-');
            const day = parseInt(parts[2], 10);
            const month = parseInt(parts[1], 10);
            const year = parseInt(parts[0], 10);
            const d = new Date(year, month - 1, day);
            const weekdayNum = d.getDay();
            const formattedDate = `${day}/${month}/${year} (${["日","一","二","三","四","五","六"][weekdayNum]})`;
            
            const customWkAmb = document.getElementById(`${type}WeekdayAmb`).value || (isVV ? "15" : "3");
            const customHolAmb = document.getElementById(`${type}HolidayAmb`).value || (isVV ? "16" : "4");
            const manualCheckboxId = `${type}ManualHoliday`;
            
            let isHolidayDay = false;
            const manualCheckbox = document.getElementById(manualCheckboxId);
            if (manualCheckbox && manualCheckbox.checked) {
                isHolidayDay = true;
            } else if (isWeekend(dateInput) || isHKHoliday(dateInput)) {
                isHolidayDay = true;
            }
            let ambassadorCount = isHolidayDay ? customHolAmb : customWkAmb;

            let salesToday = [], internToday = [];
            
            if (rosterData.length > 0) {
                // 員工數據由第 5 行開始（索引 5）
                const startRow = 5;
                // 日期 1 在索引 3，日期 12 在索引 14
                const targetCol = day + 2;
                
                for (let i = startRow; i < rosterData.length; i++) {
                    let row = rosterData[i];
                    if (!row || !row[0]) continue;
                    let fullName = String(row[0]).trim();
                    let firstName = fullName.split(' ')[0] || '';
                    if (!firstName || firstName === '姓名' || firstName === '星期' || firstName === '值勤地點') continue;
                    
                    let shiftValue = String(row[targetCol] || "").trim().toUpperCase();
                    
                    if (isVV && (shiftValue.includes('VV') || shiftValue.includes('VW'))) {
                        if (salesPool.includes(firstName) && !salesToday.includes(firstName)) {
                            salesToday.push(firstName);
                        }
                        if (internPool.includes(firstName) && !internToday.includes(firstName)) {
                            internToday.push(firstName);
                        }
                    } else if (!isVV && shiftValue.includes('TV')) {
                        if (salesPool.includes(firstName) && !salesToday.includes(firstName)) {
                            salesToday.push(firstName);
                        }
                    }
                }
            }
            
            let showflatText = "";
            const flatsArr = isVV ? vvFlats : tvFlats;
            flatsArr.forEach(flat => { if (flat.label.trim() && flat.value.trim()) showflatText += `${flat.label}：${flat.value}\n`; });

            const projName = isVV ? "維港‧灣畔現樓" : "維港‧雙鑽現樓";

            let msg = `${projName}\n${formattedDate}\n\n⏰當值時間：10:30pm-7:00pm\n\n👤當值人員\n`;
            msg += `銷售 ：${salesToday.length ? salesToday.join(', ') + ' (' + salesToday.length + '人)' : '無 (0人)'}\n`;
            if (isVV) msg += `實習生：${internToday.length ? internToday.join(', ') + ' (' + internToday.length + '人)' : '無 (0人)'}\n`;
            msg += `服務大使：${ambassadorCount}人\n清潔：${cleanerCount}人\n\n「開放示範單位」：\n${showflatText}`;
            document.getElementById(`${type}ResultMessage`).value = msg;
        }

            localStorage.setItem('hr_data_' + name, JSON.stringify({
                position: document.getElementById('hrPosition').value.trim(),
                empId: document.getElementById('hrEmpId').value.trim()
            }));
        }
        
        function exportToWord() {
            const select = document.getElementById('hrEmployeeSelect');
            if (!select.value) { alert("請先選擇員工！"); return; }
            const rowIndex = parseInt(select.value);
            const empName = select.options[select.selectedIndex].text;
            const position = document.getElementById('hrPosition').value.trim();
            const empId = document.getElementById('hrEmpId').value.trim();
            
            const rowData = rosterData[rowIndex];
            let totalHours = 0;
            let imgHtml = savedLogoBase64 ? `<img src="${savedLogoBase64}" style="width: 250px; height: auto;" />` : `<h3 style="color:#0056b3;">[未上載公司 Logo]</h3>`;
            let htmlContent = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><style>body { font-family: 'MingLiU', 'PMingLiU', 'Microsoft JhengHei', sans-serif; font-size: 12pt; } table { width: 100%; border-collapse: collapse; margin-bottom: 10px; } th, td { border: 1px solid black; padding: 6px; text-align: center; } .meta-table td { border: none; text-align: left; padding: 2px; } h2 { text-align: center; font-size: 16pt; margin-bottom: 20px; } .logo-container { text-align: left; margin-bottom: 15px; } </style></head><body><div class="logo-container">${imgHtml}</div><h2>手寫出勤記錄表 ( ${rosterYear} )年(${rosterMonth})月份</h2><table class="meta-table"><tr><td style="width: 25%;">姓名：${empName}</td><td style="width: 25%;">職位：${position}</td><td style="width: 25%;">部門/地盤：營業部</td><td style="width: 25%;">員工編號：${empId}</td></tr></table><table><tr><th style="width: 10%;">日</th><th style="width: 30%;">工作起止時間</th><th style="width: 45%;">工作內容</th><th style="width: 15%;">共計</th></tr>`;
            for (let day = 1; day <= daysInMonth; day++) {
                const parsed = parseShiftToHR(rowData[day + 2]);
                htmlContent += `<tr><td>${day}</td><td>${parsed.time}</td><td>${parsed.desc}</td><td>${parsed.hours === '--' ? '--' : parsed.hours + '小時'}</td></tr>`;
                if (typeof parsed.hours === 'number') totalHours += parsed.hours;
            }
            htmlContent += `</table><p style="text-align: right; margin-top: 10px; font-weight: bold;">總計時數：${totalHours} 小時</p></body></html>`;
            const monthWord = "July";
            const safeName = empName.replace(/ /g, '_');
            const fileDownload = document.createElement("a");
            document.body.appendChild(fileDownload);
            fileDownload.href = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(htmlContent);
            fileDownload.download = `${safeName}出勤記錄表${monthWord} ${rosterYear}.doc`;
            fileDownload.click();
            document.body.removeChild(fileDownload);
        }

        function parseShiftToHR(shiftValue) { 
            let val = (shiftValue || "").toString().trim().toUpperCase(); 
            if (!val) return { time: '--', desc: '--', hours: '--' }; 
            if (EXACT_LEAVE_TYPES[val]) return { time: EXACT_LEAVE_TYPES[val], desc: EXACT_LEAVE_TYPES[val] + '一天', hours: '--' }; 
            for (const [symbol, leaveName] of Object.entries(SYMBOL_LEAVE_TYPES)) { 
                if (val.includes(symbol)) return { time: leaveName, desc: leaveName + '一天', hours: '--' }; 
            } 
            let locations = []; 
            let timeRange = ''; 
            let foundWork = false; 
            val.split('/').forEach(p => { 
                const trimmed = p.trim(); 
                if (WORK_LOCATIONS[trimmed]) { 
                    foundWork = true; 
                    locations.push(WORK_LOCATIONS[trimmed].desc); 
                    if (timeRange === '') timeRange = WORK_LOCATIONS[trimmed].time; 
                } 
            }); 
            if (foundWork) return { time: timeRange, desc: locations.join(' / '), hours: 8.5 }; 
            return { time: '--', desc: val, hours: '--' }; 
        }

        function copyToClipboard(elementId) { 
            const t = document.getElementById(elementId); 
            if(!t.value || t.value.includes("請選擇日期")) { 
                alert("未能複製空內容"); 
                return; 
            } 
            t.select(); 
            t.setSelectionRange(0, 99999); 
            navigator.clipboard.writeText(t.value).then(() => alert("✅ 已複製")).catch(() => alert("請手動複製")); 
        }

        // ===== Dark Mode =====
        (function() {
            const toggle = document.getElementById('themeToggle');
            const icon = document.getElementById('themeIcon');
            const label = document.getElementById('themeLabel');
            const html = document.documentElement;
            const savedTheme = localStorage.getItem('cohl-theme');
            if (savedTheme === 'dark') {
                html.setAttribute('data-theme', 'dark');
                icon.textContent = '☀️';
                label.textContent = '淺色';
            }
            toggle.addEventListener('click', function() {
                const isDark = html.getAttribute('data-theme') === 'dark';
                if (isDark) {
                    html.removeAttribute('data-theme');
                    localStorage.setItem('cohl-theme', 'light');
                    icon.textContent = '🌙';
                    label.textContent = '深色';
                } else {
                    html.setAttribute('data-theme', 'dark');
                    localStorage.setItem('cohl-theme', 'dark');
                    icon.textContent = '☀️';
                    label.textContent = '淺色';
                }
            });
        })();

        // ===== 下拉菜單 =====
        document.querySelectorAll('.dropdown-toggle').forEach(function(toggle) {
            toggle.addEventListener('click', function(e) {
                e.preventDefault();
                var parent = this.closest('.dropdown');
                if (parent) {
                    parent.classList.toggle('open');
                }
            });
        });

        document.addEventListener('click', function(e) {
            document.querySelectorAll('.dropdown.open').forEach(function(dropdown) {
                if (!dropdown.contains(e.target)) {
                    dropdown.classList.remove('open');
                }
            });
        });
    </script>
</body>
</html>
