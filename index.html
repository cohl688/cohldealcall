    <style>
        :root {
            --rose-gold: #C07C88; --rose-gold-light: #E2B4BD; --rose-gold-glow: rgba(192, 124, 136, 0.4);
            --gray-900: #121212; --gray-800: #1e1e1e; --text-main: #f0f0f0; --text-muted: #a0a0a0;
        }
        * { box-sizing: border-box; font-family: 'SF Pro Display', -apple-system, sans-serif; }
        body {
            margin: 0; padding: 0; background-color: var(--gray-900);
            background-image: linear-gradient(rgba(192, 124, 136, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(192, 124, 136, 0.05) 1px, transparent 1px);
            background-size: 25px 25px; color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .header {
            width: 100%; background: linear-gradient(180deg, rgba(30,30,30,0.95), rgba(18,18,18,0.95)); backdrop-filter: blur(10px);
            color: var(--rose-gold-light); padding: 35px 20px; text-align: center; border-bottom: 2px solid var(--rose-gold); box-shadow: 0 4px 20px var(--rose-gold-glow);
        }
        .header h1 { margin: 0; font-size: 26px; letter-spacing: 3px; }
        .header p { margin: 10px 0 0 0; font-size: 12px; color: var(--text-muted); letter-spacing: 4px; }
        .portal-container { width: 100%; max-width: 600px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .section-title { font-size: 14px; color: var(--rose-gold-light); letter-spacing: 2px; margin-top: 15px; border-bottom: 1px solid rgba(192,124,136,0.3); padding-bottom: 5px; }
        
        .project-card {
            background: rgba(45, 45, 45, 0.6); border: 1px solid rgba(192, 124, 136, 0.2); border-left: 4px solid var(--rose-gold);
            border-radius: 12px; padding: 20px; text-decoration: none; color: var(--text-main); display: flex; align-items: center; justify-content: space-between; transition: all 0.3s;
        }
        .project-card:hover { transform: translateY(-3px); border-color: var(--rose-gold); box-shadow: 0 5px 20px var(--rose-gold-glow); background: rgba(60, 60, 60, 0.8); }
        .card-content h2 { margin: 0 0 5px 0; font-size: 18px; }
        .card-content p { margin: 0; font-size: 11px; color: var(--text-muted); }
        .arrow { font-size: 20px; color: var(--rose-gold); }
        .footer { margin-top: auto; padding: 30px 20px; font-size: 11px; color: #555; text-align: center; }
    </style>
</head>

        <a href="./VV_Sales.html" class="project-card" style="border-left-color:#6a11cb;"><div class="card-content"><h2>⛴️ 維港·灣畔</h2><p>Victoria Voyage</p></div><div class="arrow" style="color:#6a11cb;">➔</div></a>

        <a href="./OVCP_Sales.html" class="project-card" style="border-left-color:#4CAF50;"><div class="card-content"><h2>🛥️ 維港 1 號 (車位)</h2><p>OVCP</p></div><div class="arrow" style="color:#4CAF50;">➔</div></a>
