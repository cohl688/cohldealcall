            background-image: 
                linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.1) 55%, transparent 85%),

</head>
<body>

    <nav class="top-nav">
        <a href="./index.html" class="logo">
            <img src="./cohl-logo.png" alt="CHINA OVERSEAS Logo">
            <span class="logo-text">CHINA OVERSEAS <small>Sales System</small></span>
        </a>
        <div class="nav-links">
            <a href="./index.html" data-i18n="nav_home">主頁</a>
            <div class="dropdown active">
                <span class="dropdown-toggle" data-i18n="nav_residential">住宅</span>
                <div class="dropdown-menu">
                    <a href="./V1_Sales.html" class="active-drop" data-i18n="nav_v1">維港1號</a>
                    <a href="./VD_Sales.html" data-i18n="nav_vd">維港雙鑽</a>
                    <a href="./VV_Sales.html" data-i18n="nav_vv">維港灣畔</a>
                </div>
            </div>
            <div class="dropdown">
                <span class="dropdown-toggle" data-i18n="nav_carpark">車位</span>
                <div class="dropdown-menu">
                    <a href="./OVCP_Sales.html" data-i18n="nav_ovcp">維港1號車位</a>
                    <a href="./TVCP_Sales.html" data-i18n="nav_tvcp">維港雙鑽車位</a>

                </div>
            </div>
            <div class="dropdown">
                <span class="dropdown-toggle" data-i18n="nav_tools">使用小工具</span>
                <div class="dropdown-menu">
                    <a href="./runway_report.html" data-i18n="nav_runway">📊 報每日跑道區成交</a>
                </div>
            </div>
            <a href="./hr_management.html" data-i18n="nav_hr">人力資源</a>
        </div>
        <div class="lang-toggle">
            <button class="active-lang" data-lang="zh-HK" onclick="switchLang('zh-HK')">繁</button>
            <button data-lang="zh-CN" onclick="switchLang('zh-CN')">简</button>
            <button data-lang="en" onclick="switchLang('en')">EN</button>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="切換深色模式">
            <span id="themeIcon">🌙</span>
            <span class="toggle-label" id="themeLabel">深色</span>
        </button>
    </nav>

    <div class="container">
        <div class="hero-header">
            <span class="project-tag">CHINA OVERSEAS</span>
            <div class="header-content">
                <h1>維港1號 <small>One Victoria</small></h1>
                <div class="save-indicator" id="save-ind">● 已準備</div>
            </div>
        </div>

        <div class="content">
            <div class="card" id="settings-sec">
                <div class="section-title" onclick="toggleMappingContainer()" style="cursor:pointer; margin-bottom:0; justify-content: space-between;">
                    <span>⚙️ 證件類別對照設定（點擊展開/收起）</span>
                    <span id="collapse-icon">▼</span>
                </div>
                <div class="id-mapping" id="mapping-container" style="display:none; margin-top:15px;"></div>
            </div>

            <div class="card">
                <div class="section-title">
                    <span>1. 上傳總表（Excel）</span>
                    <span class="save-status" id="upload-status-v1">📎 未上傳</span>
                </div>
                <input type="file" id="excel-file" accept=".xlsx, .xls, .csv">
            </div>
            
            <div class="card" id="filter-sec" style="display:none;">
                <label>合約日期（B欄）：</label><select id="date-select" onchange="processData()"></select>
                <label style="margin-top:10px;display:block;">現可供出售數：</label><input type="number" id="input-available" value="1" onchange="processData()">
            </div>
            
            <div class="card" id="editor-sec" style="display:none;">
                <div class="section-title">2. 單位微調</div>
                <div id="editor-container"></div>
            </div>
            
            <div id="output-sec" style="display:none;">
                <div class="card"><div class="section-title">格仔一：當日明細</div><button class="btn" onclick="copy('out1')">複製</button><textarea id="out1" readonly></textarea></div>
                <div class="card"><div class="section-title">格仔二：銷情數據</div><button class="btn" onclick="copy('out2')">複製</button><textarea id="out2" readonly></textarea></div>
                <div class="card"><div class="section-title">格仔三：代理速報</div><button class="btn" onclick="copy('out3')">複製</button><textarea id="out3" readonly></textarea></div>
            </div>
        </div>

        <footer class="footer" style="margin-top:0; border-top:1px solid var(--cohl-border);">
            <div class="footer-inner">
                <div class="footer-links">
                    <a href="./index.html" data-i18n="footer_home">主頁</a>
                    <a href="https://www.cohl.com/en/" target="_blank" data-i18n="footer_website">官方網站</a>
                </div>
                <div class="footer-copy">© 2026 CHINA OVERSEAS HOLDINGS LIMITED.</div>
            </div>
        </footer>
    </div>

    <script>
        if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
        let allDeals = [], currentDeals = [], savedSettings = {};
        const TOTAL = 1059;

        const defaultIDMappings = {
            "香港居民身份證": "香港居民-非永居",
            "香港永久性居民身份證": "香港居民-永居",
            "香港商業登記證": "香港商業登記證",
            "中華人民共和國居民身份證": "中國內地",
            "中華人民共和國護照": "中國內地",
            "澳門特別行政區永久性居民": "澳門-永居"
        };
        let idMappings = {...defaultIDMappings};
        let freshlyDiscoveredKeys = new Set();

        function updateUploadStatus(message, isSaved) {
            const el = document.getElementById('upload-status-v1');
            if (el) {
                el.textContent = message;
                el.className = 'save-status' + (isSaved ? ' saved' : '');
            }
        }

        window.onload = () => {
            let stored = localStorage.getItem('v1_allDeals');
            let storedMappings = localStorage.getItem('v1_idMappings');
            if(storedMappings) { 
                idMappings = JSON.parse(storedMappings); 
            } else { 
                idMappings = {...defaultIDMappings}; 
            }
            renderIDMappings();
            if(stored) {
                allDeals = JSON.parse(stored);
                savedSettings = JSON.parse(localStorage.getItem('v1_settings') || '{}');
                document.getElementById('input-available').value = localStorage.getItem('v1_avail') || 1;
                updateUploadStatus('● 已載入 ' + allDeals.length + ' 筆記錄', true);
                popDates();
            }
            const savedLang = localStorage.getItem('cohl_lang') || 'zh-HK';
            switchLang(savedLang);
        };

        function save() {
            localStorage.setItem('v1_allDeals', JSON.stringify(allDeals));
            localStorage.setItem('v1_settings', JSON.stringify(savedSettings));
            localStorage.setItem('v1_avail', document.getElementById('input-available').value);
            localStorage.setItem('v1_date', document.getElementById('date-select').value);
            localStorage.setItem('v1_idMappings', JSON.stringify(idMappings));
            document.getElementById('save-ind').innerText = "● 已儲存"; setTimeout(()=>document.getElementById('save-ind').innerText="● 已準備",2000);
            updateUploadStatus('● 已儲存 ' + allDeals.length + ' 筆記錄', true);
        }

        function renderIDMappings() {
            const container = document.getElementById('mapping-container');
            container.innerHTML = '';
            Object.keys(idMappings).forEach(key => {
                const isFresh = freshlyDiscoveredKeys.has(key);
                const div = document.createElement('div');
                if (isFresh) div.className = 'custom-new-id';
                div.innerHTML = `<input type="text" value="${key}" readonly style="background:#eee; color:#555;" title="${key}"> <span>➔</span> <input type="text" value="${idMappings[key]}" onchange="updateSingleMapping('${key}', this.value)">`;
                container.appendChild(div);
            });
        }

        function updateSingleMapping(key, val) { idMappings[key] = val.trim(); save(); processData(); }

        function toggleMappingContainer() {
            const container = document.getElementById('mapping-container');
            const icon = document.getElementById('collapse-icon');
            if(container.style.display === 'none') { container.style.display = 'grid'; icon.innerText = '▲'; } 
            else { container.style.display = 'none'; icon.innerText = '▼'; }
        }

        function triggerBounceWarning() {
            const settingsSec = document.getElementById('settings-sec');
            const container = document.getElementById('mapping-container');
            const icon = document.getElementById('collapse-icon');
            container.style.display = 'grid';
            icon.innerText = '▲';
            settingsSec.classList.add('bounce-alert');
            setTimeout(() => { settingsSec.classList.remove('bounce-alert'); }, 1500);
        }

        document.getElementById('excel-file').addEventListener('change', e => {
            let reader = new FileReader();
            reader.onload = e => {
                let json = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result), {type: 'array'}).SheetNames[0]], {header: 1, defval: ""});
                allDeals = [];
                freshlyDiscoveredKeys.clear();
                let hasNewKey = false;
                for(let i=1; i<json.length; i++) {
                    if(!json[i][1] || String(json[i][1]).includes("累售")) break;
                    let rawID = String(json[i][5] || "").trim();
                    if(rawID && !idMappings.hasOwnProperty(rawID)) {
                        let defaultVal = "香港居民-非永居";
                        if(rawID.includes("永居") || rawID.includes("永久")) defaultVal = "香港居民-永居";
                        else if(rawID.includes("商業") || rawID.includes("公司")) defaultVal = "香港商業登記證";
                        else if(rawID.includes("內地") || rawID.includes("中國") || rawID.includes("護照")) defaultVal = "中國內地";
                        else if(rawID.includes("澳門")) defaultVal = "澳門-永居";
                        idMappings[rawID] = defaultVal;
                        freshlyDiscoveredKeys.add(rawID);
                        hasNewKey = true;
                    }
                    let minRow = [];
                    [1, 5, 23, 24, 25, 26, 27, 28, 29, 30, 46, 49, 52].forEach(idx => minRow[idx] = json[i][idx]);
                    allDeals.push(minRow);
                }
                if(hasNewKey) { renderIDMappings(); triggerBounceWarning(); }
                updateUploadStatus('● 已載入 ' + allDeals.length + ' 筆記錄', true);
                save();
                popDates();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function parseDate(v) {
            if(typeof v === 'number') return new Date(Math.round((v-25569)*86400*1000)).toISOString().split('T')[0];
            let p = String(v).split(/[-/]/);
            if(p.length===3) return p[2].length===4 ? `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}` : `${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`;
            return v;
        }

        function popDates() {
            let s = new Set();
            allDeals.forEach(r => { r.pDate = parseDate(r[1]); if(r.pDate) s.add(r.pDate); });
            let sel = document.getElementById('date-select'); sel.innerHTML = "";
            Array.from(s).sort().reverse().forEach(d => sel.add(new Option(d, d)));
            let sd = localStorage.getItem('v1_date'); if(sd) sel.value = sd;
            document.getElementById('filter-sec').style.display = 'block';
            processData();
        }

        function getIDStr(rawID) {
            let text = String(rawID || "").trim();
            if(idMappings[text]) return idMappings[text];
            if(text.includes("香港永久")) return "香港居民-永居";
            if(text.includes("香港居民")) return "香港居民-非永居";
            if(text.includes("商業")) return "香港商業登記證";
            if(text.includes("人民共和國")) return "中國內地";
            if(text.includes("澳門")) return "澳門-永居";
            return "香港居民-非永居";
        }

        function agInfo(n) {
            n=String(n); if(n.includes("中原")) return{n:"中原",h:"❤️"}; if(n.includes("美聯")) return{n:"美聯",h:"💛"};
            if(n.includes("利嘉閣")) return{n:"利嘉閣",h:"💙"}; if(n.includes("港置")||n.includes("置業")) return{n:"港置",h:"💚"};
            if(n.includes("世紀")||n.includes("21")) return{n:"世紀21",h:"🖤"}; if(n.includes("總會")) return{n:"總會",h:"💜"};
            if(n.includes("商會")) return{n:"香港(國際)地產商會",h:"🤍"}; if(n.includes("潤東")) return{n:"潤東置業（香港）有限公司",h:"🧡"};
            if(n.includes("搜房")) return{n:"搜房 (香港) 集團有限公司",h:"🤎"}; return {n:n||"其他",h:"🤍"};
        }

        function updateSet(u, k, v) { if(!savedSettings[u]) savedSettings[u]={}; savedSettings[u][k]=v; gen(); }

        function processData() {
            let d = document.getElementById('date-select').value; if(!d) return;
            currentDeals = allDeals.filter(r => r.pDate === d);
            let h = "";
            let idOptions = [...new Set(Object.values(idMappings))];
            currentDeals.forEach((r, i) => {
                let u = `${String(r[23]).replace(/Tower [12][AB] of Tower [12]/g, m=>m.substring(0,8).replace("Tower ","T")).replace("Tower ","T").trim()}-${r[24]}${r[25]}`;
                let cm_excel = parseFloat(String(r[52]).replace(/,/g,''))||0;
                let default_cm = (cm_excel<1&&cm_excel>0) ? (cm_excel*100).toFixed(1)+'%' : cm_excel+'%';
                let s = savedSettings[u] || {};
                let final_m = s.m || "招標售出";
                let final_id = s.id || getIDStr(r[5]);
                let final_us = s.us || "自住";
                let final_cm = s.cm !== undefined ? s.cm : default_cm;
                let idOptHtml = idOptions.map(opt => `<option value="${opt}" ${final_id===opt?'selected':''}>${opt}</option>`).join('');
                h += `<div class="editor-row"><b style="color:var(--cohl-dark); font-size:16px;">${u}</b><br>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px;">
                    <div><label style="font-size:12px;">售賣:</label> <select onchange="updateSet('${u}','m',this.value)"><option value="招標售出" ${final_m==='招標售出'?'selected':''}>招標售出</option><option value="價單售出" ${final_m==='價單售出'?'selected':''}>價單售出</option></select></div>
                    <div><label style="font-size:12px;">身份:</label> <select onchange="updateSet('${u}','id',this.value)">${idOptHtml}</select></div>
                    <div><label style="font-size:12px;">用途:</label> <select onchange="updateSet('${u}','us',this.value)"><option value="自住" ${final_us==='自住'?'selected':''}>自住</option><option value="投資" ${final_us==='投資'?'selected':''}>投資</option></select></div>
                    <div><label style="font-size:12px;">佣金:</label> <input type="text" value="${final_cm}" onchange="updateSet('${u}','cm',this.value)" placeholder="例如: 6.5%"></div>
                </div></div>`;
            });
            document.getElementById('editor-container').innerHTML = h;
            document.getElementById('editor-sec').style.display = currentDeals.length?'block':'none';
            gen();
        }

        function gen() {
            let sd = document.getElementById('date-select').value; if(!sd) return;
            let dobj = new Date(sd), w = isNaN(dobj)?"日":["日","一","二","三","四","五","六"][dobj.getDay()];
            let st = {tC:0, tA:0, tS:0, y21:0, y22:0, y23:0, y24:0, y25:0, y26:0, y26A:0, y26S:0, pN23C:0, pN23A:0, pN23S:0, pF24C:0, pF24A:0, pF24S:0};
            
            allDeals.forEach(r => {
                let yr = r.pDate ? r.pDate.substring(0,4) : "";
                let a = parseFloat(String(r[27]).replace(/,/g,''))||0, s = parseFloat(String(r[28]).replace(/,/g,''))||0;
                st.tC++; st.tA+=a; st.tS+=s;
                if(yr==='2021') st.y21++; if(yr==='2022') st.y22++; if(yr==='2023') st.y23++; if(yr==='2024') st.y24++; if(yr==='2025') st.y25++; 
                if(yr==='2026') { st.y26++; st.y26A+=a; st.y26S+=s; }
                if(r.pDate>='2023-11-11') { st.pN23C++; st.pN23A+=a; st.pN23S+=s; } 
                if(r.pDate>='2024-02-28') { st.pF24C++; st.pF24A+=a; st.pF24S+=s; } 
            });

            let shortD = parseInt(sd.split('-')[2]) + '/' + parseInt(sd.split('-')[1]) + '/' + sd.split('-')[0];
            let shortD_Msg3 = parseInt(sd.split('-')[2]) + '/' + parseInt(sd.split('-')[1]);

            let m1 = `維港1號 開單 (${shortD})(${w})\n\n`; 
            let agG = {};
            let emojis = ["1️⃣", "2️⃣", "3️⃣", "4️⃣", "5️⃣", "6️⃣", "7️⃣", "8️⃣", "9️⃣", "🔟"];
            
            currentDeals.forEach((r, i) => {
                let u = `${String(r[23]).replace(/Tower [12][AB] of Tower [12]/g, m=>m.substring(0,8).replace("Tower ","T")).replace("Tower ","T").trim()}-${r[24]}${r[25]}`;
                let cm_excel = parseFloat(String(r[52]).replace(/,/g,''))||0;
                let default_cm = (cm_excel<1&&cm_excel>0) ? (cm_excel*100).toFixed(1)+'%' : cm_excel+'%';
                let s = savedSettings[u] || {};
                let final_m = s.m || "招標售出";
                let final_id = s.id || getIDStr(r[5]);
                let final_us = s.us || "自住";
                let final_cm = s.cm !== undefined ? s.cm : default_cm;
                let sq = parseFloat(String(r[28]).replace(/,/g,''))||0;
                let ps = parseFloat(String(r[29]).replace(/,/g,''))||0;
                let am = parseFloat(String(r[27]).replace(/,/g,''))||0;
                let ag = agInfo(r[46]);
                let emo = i < emojis.length ? emojis[i] : `${i+1}️⃣`;
                let branch = String(r[49] || "").trim();
                let layout = String(r[26] || "").trim();
                
                m1 += `${emo} ${u} （${final_m}）\n實呎 ${sq}’ @$${Math.round(ps).toLocaleString('en-US')}\n戶型: ${layout}（${final_id}）(${final_us})\n合額：＄${am.toLocaleString('en-US')}\n付款：${r[30]}\n代理：${ag.n.includes('置業')?'港置':ag.n}-${branch}\n佣金：${final_cm}\n\n`;
                
                if(!agG[ag.n]) agG[ag.n] = {h:ag.h, c:0, d:[]};
                agG[ag.n].c++; agG[ag.n].d.push(`${branch}：1 (${u} ${sq}’ ${layout})`); 
            });

            let m2 = `是日累售：${currentDeals.length}伙\n\n`; 
            m2 += `2021年累售：${st.y21}伙\n2022年累售：${st.y22}伙\n2023年累售：${st.y23}伙\n2024年累售：${st.y24}伙\n2025年累售：${st.y25}伙\n`;
            m2 += `2026年累售：${st.y26}伙 (合約金額$${(st.y26A/100000000).toFixed(2)}億) (平均呎價$${(st.y26S>0?Math.round(st.y26A/st.y26S):0).toLocaleString('en-US')})\n\n`;
            m2 += `(2023年11月11日推出優惠後售出${st.pN23C}伙，合約金額$${(st.pN23A/100000000).toFixed(2)}億) (平均呎價$${(st.pN23S>0?Math.round(st.pN23A/st.pN23S):0).toLocaleString('en-US')})\n`;
            m2 += `(2024年2月28日撤辣後售出${st.pF24C}伙，合約金額$${(st.pF24A/100000000).toFixed(2)}億) [平均呎價$${(st.pF24S>0?Math.round(st.pF24A/st.pF24S):0).toLocaleString('en-US')}]\n\n`;
            m2 += `總累售：${st.tC}伙 (合約金額$${(st.tA/100000000).toFixed(2)}億) (平均呎價$${(st.tS>0?Math.round(st.tA/st.tS):0).toLocaleString('en-US')})\n`;
            m2 += `總累售（佔總伙數％）：${st.tC}伙（${((st.tC/TOTAL)*100).toFixed(1)}％）\n`;
            m2 += `總單位數：1,059伙\n現可供出售單位數: ${document.getElementById('input-available').value}伙`;

            let tEmo = currentDeals.length <= 10 && currentDeals.length > 0 ? emojis[currentDeals.length-1] : currentDeals.length;
            let m3 = `維港1號\n🔥高佣💰，即食🉐，再錄成交💥\n\n${shortD_Msg3}（${w}）：成交 ${tEmo} 粒\n`;
            let ord = ["中原","美聯","利嘉閣","港置","世紀21","總會","香港(國際)地產商會","潤東置業（香港）有限公司","搜房 (香港) 集團有限公司"];
            Object.keys(agG).sort((a,b)=>{ let x=ord.indexOf(a),y=ord.indexOf(b); return (x===-1?99:x)-(y===-1?99:y); }).forEach(k => {
                m3 += `\n${agG[k].h} ${k}：${agG[k].c}\n` + agG[k].d.join('\n');
            });

            document.getElementById('out1').value = m1.trim(); document.getElementById('out2').value = m2.trim(); document.getElementById('out3').value = m3.trim();
            document.getElementById('output-sec').style.display = 'block';
            save();
        }

                alert('✅ 已複製！');

                t.select();
                t.setSelectionRange(0, 99999);
                document.execCommand('copy');
                alert('✅ 已複製 (備用方式)');

        }

        function switchLang(lang) {
            localStorage.setItem('cohl_lang', lang);
            document.querySelectorAll('.lang-toggle button').forEach(btn => {
                btn.classList.toggle('active-lang', btn.dataset.lang === lang);
            });
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (translations[lang] && translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
        }

        // ===== Dark Mode =====
        (function() {
            const toggle = document.getElementById('themeToggle');
            const icon = document.getElementById('themeIcon');
            const label = document.getElementById('themeLabel');
            const html = document.documentElement;

            const savedTheme = localStorage.getItem('cohl-theme');
            if (savedTheme === 'dark') {
                html.setAttribute('data-theme', 'dark');
                icon.textContent = '☀️';
                label.textContent = '淺色';
            }

            toggle.addEventListener('click', function() {
                const isDark = html.getAttribute('data-theme') === 'dark';
                if (isDark) {
                    html.removeAttribute('data-theme');
                    localStorage.setItem('cohl-theme', 'light');
                    icon.textContent = '🌙';
                    label.textContent = '深色';
                } else {
                    html.setAttribute('data-theme', 'dark');
                    localStorage.setItem('cohl-theme', 'dark');
                    icon.textContent = '☀️';
                    label.textContent = '淺色';
                }
            });
        })();

        // ===== 下拉菜單 =====
        document.querySelectorAll('.dropdown-toggle').forEach(function(toggle) {
            toggle.addEventListener('click', function(e) {
                e.preventDefault();
                var parent = this.closest('.dropdown');
                if (parent) {
                    parent.classList.toggle('open');
                }
            });
        });

        document.addEventListener('click', function(e) {
            document.querySelectorAll('.dropdown.open').forEach(function(dropdown) {
                if (!dropdown.contains(e.target)) {
                    dropdown.classList.remove('open');
                }
            });
        });
