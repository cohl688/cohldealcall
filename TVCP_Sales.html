<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#e60012">
    <title>維港雙鑽 (車位) - 報數系統</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .hero-header {
            background-image: 
                linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.1) 55%, transparent 85%),
                url('維港雙鑽.jpg');
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="./index.html" class="logo">
            <img src="./cohl-logo.png" alt="CHINA OVERSEAS Logo">
            <span class="logo-text">CHINA OVERSEAS <small>Sales System</small></span>
        </a>
        <div class="nav-links">
            <a href="./index.html" data-i18n="nav_home">主頁</a>
            <div class="dropdown">
                <span class="dropdown-toggle" data-i18n="nav_residential">住宅</span>
                <div class="dropdown-menu">
                    <a href="./V1_Sales.html" data-i18n="nav_v1">維港1號</a>
                    <a href="./VD_Sales.html" data-i18n="nav_vd">維港雙鑽</a>
                    <a href="./VV_Sales.html" data-i18n="nav_vv">維港灣畔</a>
                </div>
            </div>
            <div class="dropdown active">
                <span class="dropdown-toggle" data-i18n="nav_carpark">車位</span>
                <div class="dropdown-menu">
                    <a href="./OVCP_Sales.html" data-i18n="nav_ovcp">維港1號車位</a>
                    <a href="./TVCP_Sales.html" class="active-drop" data-i18n="nav_tvcp">維港雙鑽車位</a>
                    <a href="./VVCP_Sales.html" data-i18n="nav_vvcp">維港灣畔車位</a>
                </div>
            </div>
            <div class="dropdown">
                <span class="dropdown-toggle" data-i18n="nav_tools">使用小工具</span>
                <div class="dropdown-menu">
                    <a href="./runway_report.html" data-i18n="nav_runway">📊 報每日跑道區成交</a>
                </div>
            </div>
            <a href="./hr_management.html" data-i18n="nav_hr">人力資源</a>
        </div>
        <div class="lang-toggle">
            <button class="active-lang" data-lang="zh-HK" onclick="switchLang('zh-HK')">繁</button>
            <button data-lang="zh-CN" onclick="switchLang('zh-CN')">简</button>
            <button data-lang="en" onclick="switchLang('en')">EN</button>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="切換深色模式">
            <span id="themeIcon">🌙</span>
            <span class="toggle-label" id="themeLabel">深色</span>
        </button>
    </nav>

    <div class="container">
        <div class="hero-header">
            <span class="project-tag">CHINA OVERSEAS</span>
            <div class="header-content">
                <h1>維港雙鑽車位 <small>TVCP</small></h1>
                <div class="save-indicator" id="save-ind">● 已準備</div>
            </div>
        </div>

        <div class="content">
            <div class="card">
                <div class="section-title">
                    <span>1. 上傳總表 (TVCPPropertySales.xlsx)</span>
                    <span class="save-status" id="upload-status-tvcp">📎 未上傳</span>
                </div>
                <input type="file" id="excel-file" accept=".xlsx, .xls, .csv">
            </div>
            <div class="card" id="filter-sec" style="display:none;">
                <label>合約日期 (B欄)：</label><select id="date-select" onchange="processData()"></select>
            </div>
            <div class="card" id="editor-sec" style="display:none;">
                <div class="section-title">2. 車位買家單位及佣金補錄</div>
                <div id="editor-container"></div>
            </div>
            <div id="output-sec" style="display:none;">
                <div class="card"><div class="section-title">格仔一：當日明細</div><button class="btn" onclick="copy('out1')">複製</button><textarea id="out1" readonly></textarea></div>
                <div class="card"><div class="section-title">格仔二：銷情數據</div><button class="btn" onclick="copy('out2')">複製</button><textarea id="out2" style="height:350px;" readonly></textarea></div>
            </div>
        </div>

        <footer class="footer" style="margin-top:0; border-top:1px solid var(--cohl-border);">
            <div class="footer-inner">
                <div class="footer-links">
                    <a href="./index.html" data-i18n="footer_home">主頁</a>
                    <a href="https://www.cohl.com/en/" target="_blank" data-i18n="footer_website">官方網站</a>
                </div>
                <div class="footer-copy">© 2026 CHINA OVERSEAS HOLDINGS LIMITED.</div>
            </div>
        </footer>
    </div>

    <script>
        let allDeals = [], currentDeals = [], savedSettings = {};
        const COL = { dt: 1, cp: 13, amt: 15, pay: 18, ag: 28, br: 31 };

        function updateUploadStatus(message, isSaved) {
            const el = document.getElementById('upload-status-tvcp');
            if (el) {
                el.textContent = message;
                el.className = 'save-status' + (isSaved ? ' saved' : '');
            }
        }

        window.onload = () => {
            if(localStorage.getItem('tvcp_data')) {
                allDeals = JSON.parse(localStorage.getItem('tvcp_data'));
                savedSettings = JSON.parse(localStorage.getItem('tvcp_set') || '{}');
                updateUploadStatus('● 已載入 ' + allDeals.length + ' 筆記錄', true);
                popDates();
            }
            const savedLang = localStorage.getItem('cohl_lang') || 'zh-HK';
            switchLang(savedLang);
        };

        function save() {
            localStorage.setItem('tvcp_data', JSON.stringify(allDeals));
            localStorage.setItem('tvcp_set', JSON.stringify(savedSettings));
            updateUploadStatus('● 已儲存 ' + allDeals.length + ' 筆記錄', true);
        }

        document.getElementById('excel-file').addEventListener('change', e => {
            let reader = new FileReader();
            reader.onload = ev => {
                let json = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(ev.target.result), {type: 'array'}).Sheets[XLSX.read(new Uint8Array(ev.target.result), {type: 'array'}).SheetNames[0]], {header: 1, defval: ""});
                allDeals = [];
                for(let i=1; i<json.length; i++) {
                    if(!json[i][1] || String(json[i][1]).includes("累售")) break;
                    let r = [];
                    [COL.dt, COL.cp, COL.amt, COL.pay, COL.ag, COL.br].forEach(idx => r[idx] = json[i][idx]);
                    allDeals.push(r);
                }
                updateUploadStatus('● 已載入 ' + allDeals.length + ' 筆記錄', true);
                save();
                popDates();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function parseDate(v) {
            if(typeof v === 'number') return new Date(Math.round((v-25569)*86400*1000)).toISOString().split('T')[0];
            let p = String(v).split(/[-/]/);
            if(p.length===3) return p[2].length===4 ? `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}` : `${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`;
            return v;
        }

        function popDates() {
            let s = new Set();
            allDeals.forEach(r => { r.pDate = parseDate(r[COL.dt]); if(r.pDate) s.add(r.pDate); });
            let sel = document.getElementById('date-select'); sel.innerHTML = "";
            Array.from(s).sort().reverse().forEach(d => sel.add(new Option(d, d)));
            document.getElementById('filter-sec').style.display = 'block';
            processData();
        }

        function updateSet(id, k, v) { if(!savedSettings[id]) savedSettings[id]={u:"", c:"1%"}; savedSettings[id][k]=v; gen(); }

        function processData() {
            let d = document.getElementById('date-select').value; if(!d) return;
            currentDeals = allDeals.filter(r => r.pDate === d);
            let h = "";
            currentDeals.forEach(r => {
                let cpNum = String(r[COL.cp]).trim();
                let s = savedSettings[cpNum] || {u:"", c:"1%"};
                h += `<div class="editor-row"><b>車位：${cpNum}</b>
                <div class="grid-2">
                    <div><label style="font-size:12px;">住宅單位 (例: T1A-17D)</label><input type="text" value="${s.u}" placeholder="請填寫單位" onchange="updateSet('${cpNum}','u',this.value)"></div>
                    <div><label style="font-size:12px;">佣金</label><input type="text" value="${s.c}" placeholder="例: 1%" onchange="updateSet('${cpNum}','c',this.value)"></div>
                </div></div>`;
            });
            document.getElementById('editor-container').innerHTML = h;
            document.getElementById('editor-sec').style.display = currentDeals.length ? 'block' : 'none';
            gen();
        }

        function isMoto(num) { return String(num).trim().toUpperCase().startsWith('M'); }

        function gen() {
            let sd = document.getElementById('date-select').value; if(!sd) return;
            let dobj = new Date(sd), w = isNaN(dobj)?"日":["日","一","二","三","四","五","六"][dobj.getDay()];
            let shortD = parseInt(sd.split('-')[2]) + '/' + parseInt(sd.split('-')[1]) + '/' + sd.split('-')[0];
            
            let st = { today: {p:0, m:0}, yrs: {}, totalAmt: 0 };
            
            allDeals.forEach(r => {
                let yr = r.pDate ? r.pDate.split('-')[0] : "";
                let cp = String(r[COL.cp]).trim();
                let amt = parseFloat(String(r[COL.amt]).replace(/,/g,'')) || 0;
                let m = isMoto(cp);
                
                if(!st.yrs[yr]) st.yrs[yr] = { p:0, pA:0, m:0, mA:0 };
                
                if(r.pDate === sd) { if(m) st.today.m++; else st.today.p++; }
                
                if(m) { st.yrs[yr].m++; st.yrs[yr].mA += amt; } 
                else { st.yrs[yr].p++; st.yrs[yr].pA += amt; }
                st.totalAmt += amt;
            });

            let m1 = `維港．雙鑽車位開單 (${shortD}) (${w})\n\n`;
            let emojis = ["1️⃣","2️⃣","3️⃣","4️⃣","5️⃣","6️⃣","7️⃣","8️⃣","9️⃣","🔟"];
            
            currentDeals.forEach((r, i) => {
                let cp = String(r[COL.cp]).trim();
                let s = savedSettings[cp] || {u:"", c:"1%"};
                let type = isMoto(cp) ? "電單車位" : "私家車位";
                let amt = parseFloat(String(r[COL.amt]).replace(/,/g,'')) || 0;
                let pay = String(r[COL.pay] || "").trim();
                let ag = String(r[COL.ag] || "").trim();
                let br = String(r[COL.br] || "").trim();
                let emo = i < emojis.length ? emojis[i] : `${i+1}️⃣`;
                
                m1 += `${emo}${s.u}業主選購${cp}號${type}\n合額：$${amt.toLocaleString('en-US')}\n付款辦法：${pay}\n代理：${ag} ${br}\n佣金：${s.c}\n\n`;
            });

            let m2 = `維港．雙鑽是日累售：\n${st.today.p}個私家車位\n${st.today.m}個電單車位\n\n`;
            Object.keys(st.yrs).sort().forEach(yr => {
                let d = st.yrs[yr];
                if(d.p > 0 || d.m > 0) {
                    m2 += `${yr}年累售：\n私家車位：${d.p}個\n合約額：$${d.pA.toLocaleString('en-US')}\n電單車位：${d.m}個\n合約額：$${d.mA.toLocaleString('en-US')}\n`;
                }
            });
            m2 += `總合約額：$${st.totalAmt.toLocaleString('en-US')}`;

            document.getElementById('out1').value = m1.trim();
            document.getElementById('out2').value = m2.trim();
            document.getElementById('output-sec').style.display = 'block';
            save();
        }

        // ===== 複製功能（升級版） =====
        async function copy(id) {
            const t = document.getElementById(id);
            try {
                await navigator.clipboard.writeText(t.value);
                alert('✅ 已複製！');
            } catch (err) {
                t.select();
                t.setSelectionRange(0, 99999);
                document.execCommand('copy');
                alert('✅ 已複製 (備用方式)');
            }
        }

        const translations = {
            'zh-HK': {
                'nav_home': '主頁','nav_residential': '住宅','nav_carpark': '車位','nav_tools': '使用小工具','nav_runway': '📊 報每日跑道區成交','nav_hr': '人力資源',
                'nav_v1': '維港1號','nav_vd': '維港雙鑽','nav_vv': '維港灣畔',
                'nav_ovcp': '維港1號車位','nav_tvcp': '維港雙鑽車位','nav_vvcp': '維港灣畔車位',
                'footer_home': '主頁','footer_website': '官方網站'
            },
            'zh-CN': {
                'nav_home': '主页','nav_residential': '住宅','nav_carpark': '车位','nav_tools': '使用小工具','nav_runway': '📊 报每日跑道区成交','nav_hr': '人力资源',
                'nav_v1': '维港1号','nav_vd': '维港双钻','nav_vv': '维港湾畔',
                'nav_ovcp': '维港1号车位','nav_tvcp': '维港双钻车位','nav_vvcp': '维港湾畔车位',
                'footer_home': '主页','footer_website': '官方网站'
            },
            'en': {
                'nav_home': 'Home','nav_residential': 'Residential','nav_carpark': 'Carpark','nav_tools': 'Tools','nav_runway': '📊 Daily Runway Transactions','nav_hr': 'HR',
                'nav_v1': 'One Victoria','nav_vd': 'Twin Victoria','nav_vv': 'Victoria Voyage',
                'nav_ovcp': 'One Victoria Carpark','nav_tvcp': 'Twin Victoria Carpark','nav_vvcp': 'Victoria Voyage Carpark',
                'footer_home': 'Home','footer_website': 'Official Website'
            }
        };

        function switchLang(lang) {
            localStorage.setItem('cohl_lang', lang);
            document.querySelectorAll('.lang-toggle button').forEach(btn => {
                btn.classList.toggle('active-lang', btn.dataset.lang === lang);
            });
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (translations[lang] && translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
        }

        (function() {
            const toggle = document.getElementById('themeToggle');
            const icon = document.getElementById('themeIcon');
            const label = document.getElementById('themeLabel');
            const html = document.documentElement;
            const savedTheme = localStorage.getItem('cohl-theme');
            if (savedTheme === 'dark') {
                html.setAttribute('data-theme', 'dark');
                icon.textContent = '☀️';
                label.textContent = '淺色';
            }
            toggle.addEventListener('click', function() {
                const isDark = html.getAttribute('data-theme') === 'dark';
                if (isDark) {
                    html.removeAttribute('data-theme');
                    localStorage.setItem('cohl-theme', 'light');
                    icon.textContent = '🌙';
                    label.textContent = '深色';
                } else {
                    html.setAttribute('data-theme', 'dark');
                    localStorage.setItem('cohl-theme', 'dark');
                    icon.textContent = '☀️';
                    label.textContent = '淺色';
                }
            });
        })();

        document.querySelectorAll('.dropdown-toggle').forEach(function(toggle) {
            toggle.addEventListener('click', function(e) {
                e.preventDefault();
                var parent = this.closest('.dropdown');
                if (parent) {
                    parent.classList.toggle('open');
                }
            });
        });

        document.addEventListener('click', function(e) {
            document.querySelectorAll('.dropdown.open').forEach(function(dropdown) {
                if (!dropdown.contains(e.target)) {
                    dropdown.classList.remove('open');
                }
            });
        });
    </script>
</body>
</html>
