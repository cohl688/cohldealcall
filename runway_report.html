    <script>
        // ==========================================
        // IndexedDB 儲存（獨立但共用 DB）
        // ==========================================
        const DB_NAME = "ColiAppDB";
        const STORE_FLATMIX = "FlatMixStore";
        const DB_VERSION = 3;  // 同 hr_management 同步版本

        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    // 建立 FlatMixStore（如果不存在）
                    if (!db.objectStoreNames.contains(STORE_FLATMIX)) {
                        db.createObjectStore(STORE_FLATMIX, { keyPath: "id" });
                    }
                };
                req.onsuccess = (e) => resolve(e.target.result);
                req.onerror = (e) => reject(e.target.error);
            });
        }

        async function saveDataToDB(storeName, dataId, data) {
            try {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction([storeName], "readwrite");
                    const store = tx.objectStore(storeName);
                    store.put({ id: dataId, data: data });
                    tx.oncomplete = resolve;
                    tx.onerror = reject;
                });
            } catch(e) {
                console.error("DB Save Error", e);
                throw e;
            }
        }

        async function loadDataFromDB(storeName, dataId) {
            try {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction([storeName], "readonly");
                    const store = tx.objectStore(storeName);
                    const req = store.get(dataId);
                    req.onsuccess = () => resolve(req.result ? req.result.data : null);
                    req.onerror = reject;
                });
            } catch(e) {
                console.error("DB Load Error", e);
                return null;
            }
        }

        // ==========================================
        // 核心邏輯
        // ==========================================
        let flatMixData = [];

        function updateUploadStatus(message, isSaved) {
            const el = document.getElementById('flatMixStatus');
            if (el) {
                el.textContent = message;
                el.className = 'save-status' + (isSaved ? ' saved' : '');
            }
        }

        async function resetFlatMix() {
            if (confirm("確定要清除現有 Flat Mix 數據並重新上載嗎？")) {
                flatMixData = [];
                document.getElementById('flatMixUploadBox').style.display = 'block';
                document.getElementById('resetFlatMixBtn').style.display = 'none';
                updateUploadStatus('📎 未上傳', false);
                document.getElementById('flatMixError').style.display = 'none';
                document.getElementById('flatMixFile').value = '';
                
                try {
                    const db = await openDB();
                    if (db.objectStoreNames.contains(STORE_FLATMIX)) {
                        const tx = db.transaction([STORE_FLATMIX], "readwrite");
                        tx.objectStore(STORE_FLATMIX).delete("flatMixData");
                    }
                } catch(e) {}
            }
        }

        window.onload = async function() {
            try {
                const saved = await loadDataFromDB(STORE_FLATMIX, "flatMixData");
                if (saved && saved.length > 0) {
                    flatMixData = saved;
                    updateUploadStatus('✅ 已載入 ' + flatMixData.length + ' 筆數據', true);
                    document.getElementById('flatMixUploadBox').style.display = 'none';
                    document.getElementById('resetFlatMixBtn').style.display = 'inline-block';
                } else {
                    updateUploadStatus('📎 未上傳', false);
                }
            } catch(e) {
                updateUploadStatus('⚠️ 讀取失敗，請重新上載', false);
            }

            // 載入語言偏好
            const savedLang = localStorage.getItem('cohl_lang') || 'zh-HK';
            switchLang(savedLang);
        };

        document.getElementById('flatMixFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const errorEl = document.getElementById('flatMixError');
            errorEl.style.display = 'none';
            
            if (!file) {
                errorEl.textContent = '❌ 未選擇檔案';
                errorEl.style.display = 'block';
                return;
            }

            // 檢查檔案類型
            const validTypes = ['application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', 'application/vnd.ms-excel', 'text/csv'];
            if (!validTypes.includes(file.type) && !file.name.match(/\.(xlsx|xls|csv)$/i)) {
                errorEl.textContent = '❌ 請上載 .xlsx, .xls 或 .csv 格式檔案';
                errorEl.style.display = 'block';
                return;
            }

            const reader = new FileReader();
            updateUploadStatus('🔄 處理中...', false);

            reader.onload = async function(e) {
                try {
                    const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                    flatMixData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                    await saveDataToDB(STORE_FLATMIX, "flatMixData", flatMixData);
                    
                    updateUploadStatus('✅ 已載入 ' + flatMixData.length + ' 筆數據', true);
                    document.getElementById('flatMixUploadBox').style.display = 'none';
                    document.getElementById('resetFlatMixBtn').style.display = 'inline-block';
                    alert('✅ Flat Mix 數據上載成功！');
                } catch(err) {
                    updateUploadStatus('❌ 格式錯誤', false);
                    errorEl.textContent = '❌ ' + err.message;
                    errorEl.style.display = 'block';
                }
            };
            reader.onerror = function() {
                updateUploadStatus('❌ 讀取失敗', false);
                errorEl.textContent = '❌ 無法讀取檔案，請確認檔案是否損毀';
                errorEl.style.display = 'block';
            };
            reader.readAsArrayBuffer(file);
        });

        // ==========================================
        // 跑道區成交過濾（完整保留）
        // ==========================================
        const RUNWAY_KEYWORDS = {
            "維港1號": "OV", "維港一號": "OV",
            "啟德海灣": "KTM", "啟德海灣(I)": "KTM", "啟德海灣(II)": "KTM",
            "柏蔚森": "PF",
            "MIAMIQUAY": "MQ", "MIAMIQUAY(I)": "MQ", "MIAMIQUAY(II)": "MQ",
            "DOUBLECOAST": "DC", "DOUBLECOAST(I)": "DC", "DOUBLECOAST(III)": "DC",
            "維港．雙鑽": "TV", "維港·雙鑽": "TV", "維港‧雙鑽": "TV", "維港雙鑽": "TV",
            "天璽．海": "CH", "天璽·海": "CH", "天璽‧海": "CH", "天璽海": "CH",
            "天璽．海(I)": "CH", "天璽·海(I)": "CH", "天璽‧海(I)": "CH", "天璽海(I)": "CH",
            "天璽．海2B": "CH", "天璽·海2B": "CH", "天璽‧海2B": "CH", "天璽海2B": "CH",
            "天璽．海2A": "CH", "天璽·海2A": "CH", "天璽‧海2A": "CH", "天璽海2A": "CH",
            "天瀧": "TK",
            "澐璟": "PANO",
            "維港．灣畔": "VV", "維港·灣畔": "VV", "維港‧灣畔": "VV", "維港灣畔": "VV",
            "VICTORIABLOSSOM": "VB"
        };

        function normalizeUnit(s) {
            s = s.toUpperCase().replace(/\s+/g, '');
            if (s.includes('-')) {
                let parts = s.split('-');
                if (parts.length >= 3) {
                    if (/^[A-Z]+$/.test(parts[1]) && /^\d+[A-Z]?$/.test(parts[2])) {
                        s = parts[0] + parts[2] + parts[1];
                    }
                }
            } else {
                let match = s.match(/^(\d+[A-Z]?|[A-Z]+\d+)([A-Z]+)(\d+[A-Z]?)$/);
                if (match) { s = match[1] + match[3] + match[2]; }
            }
            return s.replace(/[^A-Z0-9]/g, '');
        }

        function searchFlatMix(projectCode, cleanUnit) {
            if (!flatMixData || flatMixData.length === 0 || !cleanUnit) return null;
            let fallbackMatch = null;
            for (let i = 1; i < flatMixData.length; i++) {
                let row = flatMixData[i];
                if (!row || row.length < 12) continue;
                let rowCode = (row[0] || "").toString().toUpperCase().trim();
                if (rowCode === projectCode) {
                    let csvUnitRaw = (row[1] || "").toString().toUpperCase();
                    let cleanCSV = csvUnitRaw.replace(/[^A-Z0-9]/g, '');
                    let layout = row[9] || "未知戶型";
                    let view = row[11] || "未知景觀";
                    let result = `（${view}--${layout}）`;
                    if (cleanCSV === cleanUnit) { return result; }
                    if (!fallbackMatch) {
                        if (cleanCSV.endsWith(cleanUnit) && cleanCSV.length - cleanUnit.length <= 2) {
                            fallbackMatch = result;
                        } else if (cleanCSV.includes(cleanUnit) && cleanCSV.length - cleanUnit.length <= 2) {
                            fallbackMatch = result;
                        }
                    }
                }
            }
            return fallbackMatch;
        }

        function filterTransactions() {
            const rawText = document.getElementById('rawTransactions').value;
            if (!rawText.trim()) {
                alert("請先貼上原始成交訊息！");
                return;
            }
            
            if (flatMixData.length === 0) {
                alert("⚠️ 請先上載 Flat Mix Excel！");
                return;
            }

            const separator = "🔸🔹🔸🔹🔸🔹";
            const blocks = rawText.split(/🔸🔹🔸🔹🔸🔹/);
            if (blocks.length < 2) {
                alert("未能偵測到分隔線(🔸🔹🔸🔹🔸🔹)，請確保貼上完整訊息。");
                return;
            }

            const header = blocks.shift();
            let dateStr = "今日";
            const dateMatch = header.match(/(.*?)(一手市場成交|一手成交).*?[:：]\s*\(\d+\)/) || header.match(/(.*?)(一手市場成交|一手成交)/);
            if (dateMatch) { dateStr = dateMatch[1].trim(); }

            let validBlocks = [];
            let totalCount = 0;

            blocks.forEach(block => {
                if (!block.trim()) return;
                let lines = block.split('\n').map(l => l.trim()).filter(l => l);
                if (lines.length === 0) return;

                let projLine = lines[0];
                let upperProj = projLine.toUpperCase().replace(/\s+/g, '');
                let projectCode = null;
                for (const [key, code] of Object.entries(RUNWAY_KEYWORDS)) {
                    if (upperProj.includes(key)) { projectCode = code; break; }
                }

                if (projectCode) {
                    let agencies = [];
                    let currentAgency = null;
                    let standaloneUnits = [];

                    for (let i = 1; i < lines.length; i++) {
                        let line = lines[i];
                        let agencyMatch = line.match(/^(.*?)([:：])\s*(\d+)\s*$/);
                        if (agencyMatch && !line.includes('(') && !line.includes('（')) {
                            currentAgency = { prefix: agencyMatch[1], colon: agencyMatch[2], units: [] };
                            agencies.push(currentAgency);
                        } else {
                            if (currentAgency) {
                                currentAgency.units.push(line);
                            } else {
                                standaloneUnits.push(line);
                            }
                        }
                    }

                    let processedStandalone = [];
                    let projectUnitCount = 0;

                    const processUnit = (line) => {
                        projectUnitCount++;
                        let cleanLine = line.replace(/[期座室樓層]/g, '');
                        let prefix = cleanLine.split(/[\u4e00-\u9fa5]/)[0];
                        let rawUnitToken = prefix.trim().split(/\s+/)[0];
                        let unitToken = normalizeUnit(rawUnitToken);
                        let info = searchFlatMix(projectCode, unitToken);
                        return info ? `${line} ${info}` : line;
                    };

                    standaloneUnits.forEach(u => processedStandalone.push(processUnit(u)));

                    agencies.forEach(ag => {
                        let processed = [];
                        ag.units.forEach(u => processed.push(processUnit(u)));
                        ag.processedUnits = processed;
                        ag.actualCount = ag.units.length;
                    });

                    let origCountMatch = projLine.match(/[:：]\s*(\d+)/);
                    let origCount = origCountMatch ? parseInt(origCountMatch[1], 10) : 0;
                    let finalProjCount = projectUnitCount > 0 ? projectUnitCount : origCount;
                    totalCount += finalProjCount;

                    let newProjLine = projLine;
                    if (projLine.match(/[:：]\s*\d+/)) {
                        newProjLine = projLine.replace(/([:：]\s*)\d+/, `$1${finalProjCount}`);
                    } else {
                        newProjLine = `${projLine}：${finalProjCount}`;
                    }

                    let blockLines = [newProjLine, ...processedStandalone];
                    agencies.forEach(ag => {
                        if (ag.actualCount > 0) {
                            blockLines.push(`${ag.prefix}${ag.colon}${ag.actualCount}`);
                            blockLines.push(...ag.processedUnits);
                        } else if (ag.actualCount === 0 && projectUnitCount === 0) {
                            blockLines.push(`${ag.prefix}${ag.colon}${origCountMatch ? origCount : 1}`);
                        }
                    });

                    validBlocks.push(blockLines.join('\n'));
                }
            });

            let finalText = `${dateStr}一手跑道區成交：(${totalCount})\n${separator}\n`;
            finalText += validBlocks.join(`\n${separator}\n`);
            if (validBlocks.length > 0) { finalText += `\n${separator}`; }

            document.getElementById('filteredTransactions').value = finalText;
        }

        function copyToClipboard(elementId) {
            const t = document.getElementById(elementId);
            if (!t.value || t.value.includes("請先上載") || t.value.includes("過濾後的結果")) {
                alert("未能複製空內容");
                return;
            }
            t.select();
            t.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(t.value).then(() => alert("✅ 已複製")).catch(() => alert("請手動複製"));
        }

        // ==========================================
        // 語言切換
        // ==========================================
        const translations = {
            'zh-HK': {
                'nav_home': '主頁','nav_residential': '住宅','nav_carpark': '車位','nav_tools': '使用小工具','nav_runway': '📊 報每日跑道區成交','nav_hr': '人力資源',
                'nav_v1': '維港1號','nav_vd': '維港雙鑽','nav_vv': '維港灣畔',
                'nav_ovcp': '維港1號車位','nav_tvcp': '維港雙鑽車位','nav_vvcp': '維港灣畔車位',
                'footer_home': '主頁','footer_website': '官方網站'
            },
            'zh-CN': {
                'nav_home': '主页','nav_residential': '住宅','nav_carpark': '车位','nav_tools': '使用小工具','nav_runway': '📊 报每日跑道区成交','nav_hr': '人力资源',
                'nav_v1': '维港1号','nav_vd': '维港双钻','nav_vv': '维港湾畔',
                'nav_ovcp': '维港1号车位','nav_tvcp': '维港双钻车位','nav_vvcp': '维港湾畔车位',
                'footer_home': '主页','footer_website': '官方网站'
            },
            'en': {
                'nav_home': 'Home','nav_residential': 'Residential','nav_carpark': 'Carpark','nav_tools': 'Tools','nav_runway': '📊 Daily Runway Transactions','nav_hr': 'HR',
                'nav_v1': 'One Victoria','nav_vd': 'Twin Victoria','nav_vv': 'Victoria Voyage',
                'nav_ovcp': 'One Victoria Carpark','nav_tvcp': 'Twin Victoria Carpark','nav_vvcp': 'Victoria Voyage Carpark',
                'footer_home': 'Home','footer_website': 'Official Website'
            }
        };

        function switchLang(lang) {
            localStorage.setItem('cohl_lang', lang);
            document.querySelectorAll('.lang-toggle button').forEach(btn => {
                btn.classList.toggle('active-lang', btn.dataset.lang === lang);
            });
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (translations[lang] && translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
        }

        // ==========================================
        // Dark Mode & 下拉菜單
        // ==========================================
        (function() {
            const toggle = document.getElementById('themeToggle');
            const icon = document.getElementById('themeIcon');
            const label = document.getElementById('themeLabel');
            const html = document.documentElement;

            const savedTheme = localStorage.getItem('cohl-theme');
            if (savedTheme === 'dark') {
                html.setAttribute('data-theme', 'dark');
                icon.textContent = '☀️';
                label.textContent = '淺色';
            }

            toggle.addEventListener('click', function() {
                const isDark = html.getAttribute('data-theme') === 'dark';
                if (isDark) {
                    html.removeAttribute('data-theme');
                    localStorage.setItem('cohl-theme', 'light');
                    icon.textContent = '🌙';
                    label.textContent = '深色';
                } else {
                    html.setAttribute('data-theme', 'dark');
                    localStorage.setItem('cohl-theme', 'dark');
                    icon.textContent = '☀️';
                    label.textContent = '淺色';
                }
            });
        })();

        document.querySelectorAll('.dropdown-toggle').forEach(function(toggle) {
            toggle.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                var parent = this.closest('.dropdown');
                if (parent) {
                    document.querySelectorAll('.dropdown.open').forEach(function(d) {
                        if (d !== parent) d.classList.remove('open');
                    });
                    parent.classList.toggle('open');
                }
            });
        });

        document.addEventListener('click', function(e) {
            document.querySelectorAll('.dropdown.open').forEach(function(dropdown) {
                if (!dropdown.contains(e.target)) {
                    dropdown.classList.remove('open');
                }
            });
        });
    </script>
</body>
</html>
